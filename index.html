<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>夕食献立管理</title>
<script>(function(){var z={'medium':'1','large':'1.2','xlarge':'1.4'};if(!localStorage.getItem('menuApp_fontSize'))localStorage.setItem('menuApp_fontSize','medium');var s=localStorage.getItem('menuApp_fontSize');document.documentElement.style.zoom=z[s]||'1';})();</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a1a4e;--amber:#B87800;--amber-l:#FFF0CC;
  --green:#2E7D32;--green-l:#E8F5E9;--red:#C62828;
  --gray:#555555;--gray-l:#F5F5F5;--border:#E0D8C8;
  --bg:#FFFDF5;--shadow:0 2px 8px rgba(0,0,0,.1);--r:12px;--nav:68px;--header-h:57px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--navy);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}
.header{background:var(--navy);color:#fff;padding:16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:700;flex:1}
.header .back-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:10px 14px;min-width:44px;min-height:44px;}
.content{flex:1;padding:16px;padding-bottom:calc(var(--nav)+16px)}
.content.no-pad-bottom{padding-bottom:16px}

/* TOP */
.week-card{background:#fff;border:2px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);transition:.2s}
.week-card:hover{border-color:var(--amber)}
.week-card.latest{border-color:var(--amber);background:var(--amber-l)}
.week-card .label{font-size:15px;font-weight:600}
.week-card .latest-badge{background:var(--amber);color:#fff;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700}
.week-card .arrow{color:var(--gray);font-size:18px}
.section-title{font-size:14px;color:var(--gray);font-weight:600;margin:16px 0 8px;text-transform:uppercase;letter-spacing:.5px}
.info-btn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:20px}
.archive-link{text-align:center;color:var(--amber);font-size:14px;cursor:pointer;padding:12px;text-decoration:underline}

/* WEEK TABS */
.week-tabs{display:grid;grid-template-columns:repeat(7,1fr);background:#fff;border-bottom:2px solid var(--border);position:sticky;top:var(--header-h);z-index:90}
.day-tab{padding:10px 6px;font-size:18px;font-weight:800;color:var(--gray);cursor:pointer;border-bottom:3px solid transparent;text-align:center;line-height:1.3;user-select:none}
.day-tab small{display:block;font-size:12px;font-weight:600;margin-top:3px}
.day-tab.active{color:#fff;background:var(--navy);border-bottom-color:var(--amber)}
.day-tab.no-cook{color:#bbb}
.day-tab.sat{color:#1565c0;background:#e8f4ff}
.day-tab.sun{color:#c62828;background:#fff0f0}
.day-tab.sat.no-cook{color:#90caf9;background:#f0f8ff}
.day-tab.sun.no-cook{color:#ef9a9a;background:#fff8f8}
.day-tab.sat.active{background:#1565c0;color:#fff}
.day-tab.sun.active{background:#c62828;color:#fff}
.bottom-tabs{display:flex;background:#fff;border-top:2px solid var(--border);position:sticky;bottom:0;z-index:100}
.btab{flex:1;padding:10px 4px 8px;font-size:13px;font-weight:600;color:var(--gray);cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;border-top:4px solid transparent;transition:.15s}
.btab.active{color:var(--amber);border-top-color:var(--amber);background:var(--amber-l);font-weight:800}
.btab .ico{font-size:24px}
.btab.active .ico{transform:scale(1.15)}

/* DISH CARD */
.dish-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.dish-header{padding:14px 16px;background:var(--green-l);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.dish-title{font-size:18px;font-weight:700;color:var(--navy)}
.dish-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:12px;padding:2px 8px;border-radius:20px;background:var(--gray-l);color:var(--gray);font-weight:600}
.tag.green{background:var(--green-l);color:var(--green)}
.dish-target{font-size:12px;color:var(--gray);background:#fff;border-radius:6px;padding:2px 8px}
.dish-section{padding:12px 16px;border-bottom:1px solid var(--border)}
.dish-section:last-child{border-bottom:none}
.dish-section h4{font-size:13px;font-weight:700;color:var(--gray);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.ing-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0ede5;font-size:16px}
.ing-row:last-child{border-bottom:none}
.ing-name{color:var(--navy)}
.ing-amt{color:var(--gray);font-weight:600}
.ing-amt.editable{cursor:pointer;border-bottom:1px dashed var(--amber);padding-bottom:1px}
.ing-amt.editable:active{opacity:.7}
.ing-adj-badge{font-size:10px;color:var(--amber);margin-left:3px}
.equip-list{display:flex;flex-wrap:wrap;gap:6px}
.equip-tag{background:var(--amber-l);color:var(--amber);font-size:12px;padding:4px 10px;border-radius:20px;font-weight:600}
.note-box{background:#FFF9E6;border-left:3px solid var(--amber);padding:10px 12px;border-radius:0 8px 8px 0;font-size:14px;color:var(--navy)}

/* NO COOK */
.no-cook-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:32px 20px;text-align:center;margin-top:20px}
.no-cook-icon{font-size:48px;margin-bottom:12px}
.no-cook-title{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:8px}
.no-cook-sub{font-size:14px;color:var(--gray);line-height:1.7}

/* SHOPPING */
.shop-category{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.shop-cat-header{padding:12px 16px;background:var(--navy);color:#fff;display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
.shop-item{display:flex;align-items:center;gap:12px;padding:14px 16px;min-height:56px;border-bottom:1px solid var(--border);cursor:pointer}
.shop-item:last-child{border-bottom:none}
.shop-check{width:44px;height:44px;border-radius:8px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;transition:.15s;font-size:20px}
.shop-check.done{background:var(--green);border-color:var(--green);color:#fff}
.shop-item-name{flex:1;font-size:14px;font-weight:600}
.shop-item-detail{font-size:12px;color:var(--gray)}

/* PROGRESS */
.reset-btn{width:100%;background:var(--gray-l);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px;color:var(--gray);cursor:pointer;margin-top:8px;font-weight:600}

/* INFO */
.info-section{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.info-sec-header{padding:12px 16px;background:var(--navy);color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
.info-row{padding:10px 16px;border-bottom:1px solid var(--border);font-size:14px;display:flex;gap:8px}
.info-row:last-child{border-bottom:none}
.info-key{color:var(--gray);min-width:80px;flex-shrink:0;font-weight:600}
.info-val{color:var(--navy);flex:1}
.info-badge{display:inline-block;background:var(--amber-l);color:var(--amber);font-size:11px;padding:2px 7px;border-radius:10px;font-weight:700;margin:1px}
.info-badge.red{background:#FDECEA;color:var(--red)}
.info-badge.green{background:var(--green-l);color:var(--green)}

/* ADMIN */
.admin-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
.admin-card h3{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--navy)}
.form-group{margin-bottom:14px}
.form-label{font-size:13px;font-weight:600;color:var(--gray);margin-bottom:4px;display:block}
.form-input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:15px;background:#fff;color:var(--navy);outline:none;transition:.2s}
.form-input:focus{border-color:var(--amber)}
.form-textarea{min-height:80px;resize:vertical;font-family:inherit}
.btn-primary{width:100%;background:var(--amber);color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:16px;font-weight:700;cursor:pointer}
.btn-secondary{width:100%;background:var(--gray-l);border:1px solid var(--border);border-radius:var(--r);padding:12px;font-size:14px;font-weight:600;color:var(--navy);cursor:pointer;margin-top:8px}
.btn-danger{background:var(--red);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer}
.week-admin-row{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.week-admin-row .wlabel{font-size:15px;font-weight:600}
.week-admin-row .actions{display:flex;gap:8px}
.btn-edit{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer}
.admin-day-tabs{display:flex;overflow-x:auto;gap:6px;margin-bottom:16px;padding-bottom:4px}
.admin-day-tabs::-webkit-scrollbar{display:none}
.admin-day-tab{flex:0 0 auto;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid var(--border);background:#fff;color:var(--gray)}
.admin-day-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.cooking-toggle{display:flex;gap:8px;margin-bottom:16px}
.cooking-toggle button{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:2px solid var(--border);background:#fff;color:var(--gray)}
.cooking-toggle button.active{background:var(--green);color:#fff;border-color:var(--green)}
.dish-edit-block{background:var(--gray-l);border-radius:var(--r);padding:14px;margin-bottom:12px}
.dish-edit-block h4{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--navy)}
.alert{padding:10px 14px;border-radius:8px;font-size:14px;margin-bottom:12px}
.alert.success{background:var(--green-l);color:var(--green)}
.alert.error{background:#FDECEA;color:var(--red)}

/* ARCHIVE */
.archive-week-row{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.archive-week-row:hover{opacity:.85}

/* PRESET PICKER */
.btn-preset-open{width:100%;background:linear-gradient(135deg,var(--amber),#D4900A);color:#fff;border:none;border-radius:var(--r);padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 2px 8px rgba(184,120,0,.3)}
.preset-panel{background:#fff;border:2px solid var(--amber);border-radius:var(--r);margin-bottom:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.preset-panel-header{background:var(--navy);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:15px}
.preset-close-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:2px 6px}
.preset-search{width:100%;border:none;border-bottom:1.5px solid var(--border);padding:10px 16px;font-size:15px;outline:none;background:#FAFAFA}
.preset-search:focus{border-bottom-color:var(--amber);background:#fff}
.preset-cat-row{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;border-bottom:1px solid var(--border)}
.preset-cat-row::-webkit-scrollbar{display:none}
.preset-cat-btn{flex:0 0 auto;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--gray);transition:.15s}
.preset-cat-btn.active{background:var(--amber);color:#fff;border-color:var(--amber)}
.preset-list{max-height:300px;overflow-y:auto}
.preset-item{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);transition:.15s;gap:12px}
.preset-item:last-child{border-bottom:none}
.preset-item:hover{background:var(--amber-l)}
.preset-item-info{flex:1;min-width:0}
.preset-item-name{font-size:14px;font-weight:700;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preset-item-meta{font-size:12px;color:var(--gray);margin-top:2px}
.preset-add-btn{flex-shrink:0;background:var(--green);color:#fff;border:none;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:.1s}
.preset-add-btn:active{opacity:.8}
.preset-empty{padding:20px;text-align:center;color:var(--gray);font-size:14px}

/* RATING */
.dish-rating{display:flex;gap:16px;justify-content:flex-end;padding:12px 16px;border-top:1px solid var(--border)}
.rating-btn{background:var(--gray-l);border:1.5px solid var(--border);border-radius:20px;padding:8px 20px;font-size:16px;cursor:pointer;font-weight:700;transition:.15s;min-height:44px}
.rating-btn.good:hover,.rating-btn.good:active{background:var(--green-l);border-color:var(--green)}
.rating-btn.bad:hover,.rating-btn.bad:active{background:#FDECEA;border-color:var(--red)}
.rating-toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;pointer-events:none;opacity:0;transition:opacity .3s;max-width:90vw;text-align:center;line-height:1.5;word-break:break-all}
.rating-toast.show{opacity:1}

/* SIDES */
.sides-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.sides-header{padding:10px 16px;background:#f0f4ff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:14px;color:var(--navy)}
.sides-toggle-btn{background:none;border:none;font-size:13px;color:var(--amber);font-weight:700;cursor:pointer}
.side-type-select{border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;background:#fff;color:var(--navy);flex-shrink:0}
.side-edit-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.side-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border)}
.side-row:last-child{border-bottom:none}
.side-type-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--amber-l);color:var(--amber);flex-shrink:0}
.side-name{flex:1;font-size:15px;font-weight:600;color:var(--navy)}
.aeon-btn{flex-shrink:0;background:#00853e;color:#fff;border-radius:8px;padding:6px 10px;font-size:14px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;min-width:44px;min-height:36px}
.aeon-btn:hover{opacity:.85}
.side-edit-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.aeon-picker{background:#fff;border:2px solid #00853e;border-radius:var(--r);margin-bottom:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.aeon-picker-header{background:#00853e;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:15px}
.aeon-picker-list{max-height:280px;overflow-y:auto}
.aeon-picker-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;font-size:14px;color:var(--navy)}
.aeon-picker-item:hover{background:#e8f5ee}
.aeon-picker-item:last-child{border-bottom:none}
.aeon-picker-cats{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;border-bottom:1px solid var(--border)}
.aeon-picker-cats::-webkit-scrollbar{display:none}
.aeon-cat-btn{flex:0 0 auto;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--gray)}
.aeon-cat-btn.active{background:#00853e;color:#fff;border-color:#00853e}

/* ALL MENUS LIST */
.all-menu-item{background:#fff;border-radius:var(--r);box-shadow:var(--shadow-sm,var(--shadow));margin-bottom:10px;padding:12px 16px;display:flex;align-items:center;gap:12px}
.all-menu-info{flex:1;min-width:0}
.all-menu-name{font-size:15px;font-weight:700;color:var(--navy);word-break:break-all}
.all-menu-meta{font-size:12px;color:var(--gray);margin-top:3px}
.all-menu-rating{display:flex;gap:6px;flex-shrink:0}
.all-menu-btn{background:var(--gray-l);border:1.5px solid var(--border);border-radius:16px;padding:5px 12px;font-size:13px;cursor:pointer;font-weight:700;min-height:36px}
.all-menu-btn.good:hover,.all-menu-btn.good:active{background:var(--green-l);border-color:var(--green)}
.all-menu-btn.bad:hover,.all-menu-btn.bad:active{background:#FDECEA;border-color:var(--red)}
/* TODAY WEEK BUTTON */
.today-week-btn{background:#fff;color:var(--navy);border:2px solid var(--border);border-radius:var(--r);padding:28px 20px;margin-bottom:20px;cursor:pointer;text-align:center;box-shadow:var(--shadow);transition:.2s;width:100%;display:block}
.today-week-btn:active{transform:scale(.98);opacity:.95}
.today-week-icon{font-size:52px;margin-bottom:8px}
.today-week-label{font-size:28px;font-weight:800;margin-bottom:6px;letter-spacing:.5px}
.today-week-date{font-size:15px;opacity:.75;margin-bottom:14px}
.today-badge{display:inline-block;background:var(--amber);padding:8px 24px;border-radius:24px;font-size:15px;font-weight:700}
/* TOP NAV GRID */
.top-nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 0 16px}
.top-nav-btn{background:#fff;border:2px solid var(--border);border-radius:var(--r);padding:22px 12px;text-align:center;cursor:pointer;font-size:16px;font-weight:700;color:var(--navy);box-shadow:var(--shadow);transition:.2s}
.top-nav-btn:active{border-color:var(--amber);background:var(--amber-l)}
.top-nav-btn .nav-icon{font-size:32px;display:block;margin-bottom:8px}

@media print{
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{background:#fff!important;font-size:10pt}
  .week-tabs,.bottom-tabs,.btab,.back-btn,.no-print,
  .dish-rating,.rating-btn,.note-box,.equip-list,.dish-section:has(h4:empty){display:none!important}
  #app{max-width:100%!important;zoom:1!important}
  .screen{display:none!important}
  #screen-week{display:block!important}
  .header{background:var(--navy)!important;color:#fff!important;padding:4pt 8pt!important;position:static!important}
  .header h1{font-size:11pt!important}
  #week-content{padding:4pt!important;padding-bottom:0!important}
  /* 全曜日を2列グリッドで並べて1ページに収める */
  #print-all-days{display:grid!important;grid-template-columns:1fr 1fr;gap:6pt;align-items:start}
  .print-day-block{break-inside:avoid;margin-bottom:0;border:1px solid #bbb;border-radius:4pt;overflow:hidden}
  .print-day-header{background:var(--navy)!important;color:#fff!important;padding:4pt 8pt;font-size:11pt;font-weight:700}
  .dish-card{break-inside:avoid;box-shadow:none!important;border:none!important;border-bottom:1px solid #eee!important;margin-bottom:0!important;border-radius:0!important}
  .dish-card:last-child{border-bottom:none!important}
  .dish-header{padding:5pt 8pt!important;background:#f5f9f5!important}
  .dish-title{font-size:10pt!important;font-weight:700}
  .dish-meta{margin-top:3pt!important}
  .dish-section{padding:4pt 8pt!important}
  .dish-section h4{font-size:9pt!important;margin-bottom:4pt!important}
  .ing-row{display:flex;padding:2pt 0!important;border-bottom:none!important;font-size:9pt;break-inside:avoid}
  .ing-name{color:#333}
  .ing-amt{font-size:9pt!important;font-weight:600}
  .tag{font-size:7.5pt!important;padding:1.5pt 5pt!important}
  .equip-tag{font-size:7.5pt!important}
  .print-sides{padding:5pt 8pt;border-top:1px solid #eee;font-size:9pt;color:#333;background:#f9f9f9}
  .print-sides-label{font-weight:700;margin-right:5pt;color:var(--navy)}
  @page{size:A4;margin:6mm}
}
</style>
</head>
<body>
<datalist id="target-candidates">
  <option value="父・兄（2人分）">
  <option value="母（1人分）">
  <option value="3人分">
</datalist>
<div id="app">

<!-- TOP -->
<div id="screen-top" class="screen">

  <div class="content no-pad-bottom" id="top-content"></div>
</div>

<!-- PAST -->
<div id="screen-past" class="screen">
  <div class="header"><button class="back-btn" onclick="go('top')">←</button><h1>過去の献立</h1></div>
  <div class="content no-pad-bottom" id="past-content"></div>
</div>

<!-- FUTURE -->
<div id="screen-future" class="screen">
  <div class="header"><button class="back-btn" onclick="go('top')">←</button><h1>来週以降の献立</h1></div>
  <div class="content no-pad-bottom" id="future-content"></div>
</div>

<!-- ALL MENUS -->
<div id="screen-all-menus" class="screen">
  <div class="header"><button class="back-btn" onclick="go('top')">←</button><h1>全献立リスト</h1></div>
  <div class="content no-pad-bottom">
    <div style="display:flex;gap:6px;padding:8px 0">
      <input id="all-menus-search" class="form-input" placeholder="🔍 メニュー名・材料で検索..." oninput="allMenusSelected=null;renderAllMenus()" style="flex:1">
    </div>
    <div id="all-menus-cats" style="display:flex;gap:6px;overflow-x:auto;padding:4px 0 6px;flex-wrap:nowrap"></div>
    <div id="all-menus-labels" style="padding:0 0 6px"></div>
    <div id="all-menus-genres" style="display:flex;gap:6px;overflow-x:auto;padding:4px 0 10px;flex-wrap:nowrap"></div>
    <div id="all-menus-list"></div>
  </div>
</div>

<!-- WEEK -->
<div id="screen-week" class="screen">
  <div class="header"><button class="back-btn" onclick="go('top')">←</button><h1 id="week-title">献立</h1></div>
  <div id="day-tabs" class="week-tabs"></div>
  <div id="week-content" class="content" style="padding-bottom:calc(var(--nav) + 16px)"></div>
  <div class="bottom-tabs">
    <div class="btab active" id="btab-menu" onclick="setWeekTab('menu')"><span class="ico">📅</span>献立</div>
    <div class="btab" id="btab-shop" onclick="setWeekTab('shop')"><span class="ico">🛒</span>今週の材料</div>
    <div class="btab no-print" id="btab-print" onclick="printWeek()"><span class="ico">🖨️</span>印刷</div>
  </div>
</div>

<!-- INFO -->
<div id="screen-info" class="screen">
  <div class="header"><button class="back-btn" onclick="go('top')">←</button><h1>前提情報・ルール</h1></div>
  <div class="content no-pad-bottom" id="info-content"></div>
</div>

<!-- ADMIN LOGIN -->
<div id="screen-admin-login" class="screen">
  <div class="header"><button class="back-btn" onclick="go('top')">←</button><h1>管理画面ログイン</h1></div>
  <div class="content no-pad-bottom">
    <div class="admin-card">
      <h3>🔒 パスワードを入力</h3>
      <div class="form-group">
        <label class="form-label">パスワード</label>
        <input class="form-input" type="password" id="admin-pw-input" placeholder="0000" onkeydown="if(event.key==='Enter')checkAdminPw()">
      </div>
      <div id="admin-pw-error" class="alert error" style="display:none">パスワードが違います</div>
      <button class="btn-primary" onclick="checkAdminPw()">ログイン</button>
    </div>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="screen-admin" class="screen">
  <div class="header"><button class="back-btn" onclick="go('top')">←</button><h1>管理画面</h1></div>
  <div class="content no-pad-bottom">
    <button class="btn-primary" style="margin-bottom:16px" onclick="goAdminNewWeek()">＋ 新しい週を追加</button>
    <div class="section-title">登録済み週</div>
    <div id="admin-week-list"></div>
    <div class="admin-card" style="margin-top:20px">
      <h3>💾 データ管理</h3>
      <button class="btn-secondary" style="margin-bottom:8px" onclick="backupJSON()">📥 JSONバックアップ</button>
      <button class="btn-secondary" onclick="restoreJSON()">📤 JSON復元</button>
      <input type="file" id="restore-file-input" accept=".json" style="display:none" onchange="onRestoreFileSelected(event)">
      <p style="font-size:12px;color:var(--gray);margin-top:8px">💡 週1回程度バックアップすることを推奨します。Gist障害時の復元に使えます。</p>
    </div>
    <div class="admin-card" style="margin-top:20px">
      <h3>🔗 Gist同期設定</h3>
      <p style="font-size:13px;color:var(--gray);margin-bottom:12px">ページ読み込み時にGistからデータを取得します。<br>PATはこの端末（管理者）のみ設定してください。</p>
      <div class="form-group">
        <label class="form-label">GitHub PAT（管理者のみ）</label>
        <div style="display:flex;gap:8px">
          <input class="form-input" type="password" id="gist-pat-input" placeholder="ghp_..." style="flex:1">
          <button class="btn-primary" style="white-space:nowrap" onclick="saveGistPat(document.getElementById('gist-pat-input').value)">保存</button>
        </div>
      </div>
      <button class="btn-secondary" onclick="testGistSync()">🔍 接続テスト</button>
      <div id="gist-status" style="margin-top:10px;font-size:13px;color:var(--gray)"></div>
    </div>
    <div class="admin-card" style="margin-top:20px">
      <h3>🔑 パスワード設定</h3>
      <div id="pw-toggle-row" style="margin-bottom:12px;display:flex;align-items:center;gap:10px">
        <span style="font-size:14px;color:var(--navy)" id="pw-enabled-label"></span>
        <button class="btn-secondary" style="padding:6px 14px;font-size:13px" onclick="togglePasswordEnabled()">切り替える</button>
      </div>
      <div id="pw-change-section">
        <div class="form-group"><label class="form-label">パスワード変更</label><input class="form-input" type="password" id="new-pw" placeholder="新パスワード"></div>
        <button class="btn-primary" onclick="changeAdminPw()">変更する</button>
      </div>
      <div id="pw-change-msg" style="display:none;margin-top:8px"></div>
    </div>
  </div>
</div>

<!-- ADMIN WEEK EDIT -->
<div id="screen-admin-week" class="screen">

    <div id="aw-save-msg" style="display:none;margin-top:8px"></div>
  </div>
</div>

  localStorage.setItem('menuApp_localUpdatedAt',new Date().toISOString());

}

const BACKUP_VERSION=1;
function backupJSON(){
  const payload={version:BACKUP_VERSION,exportedAt:new Date().toISOString(),data:DB};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const d=new Date();
  a.download=`menu_backup_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();URL.revokeObjectURL(url);
}
function restoreJSON(){
  document.getElementById('restore-file-input').value='';
  document.getElementById('restore-file-input').click();
}
function onRestoreFileSelected(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    let payload;
    try{payload=JSON.parse(ev.target.result);}
    catch{alert('JSONファイルの読み込みに失敗しました。');return;}
    if(!payload.version||!payload.data||!payload.data.weeks){
      alert('このファイルは有効なバックアップデータではありません。');return;
    }
    appConfirm('現在のデータをバックアップファイルで上書きします。よろしいですか？',()=>{
      localStorage.setItem('menuApp_v4',JSON.stringify(payload.data));
      alert('復元が完了しました。画面を再読み込みします。');
      location.reload();
    });
  };
  reader.readAsText(file);
}

  else if(p==='week') renderWeek();
  else if(p==='info') renderInfo();
  else if(p==='admin') renderAdmin();

  else if(p==='archive') renderArchive();

  else if(p==='future') renderFuture();
  else if(p==='all-menus'){allMenusCat='すべて';renderAllMenus();}
}

function getWeekLabel(k){
  const d=new Date(k+'T00:00:00');
  const e=new Date(d);e.setDate(e.getDate()+6);
  const fmt=x=>`${x.getMonth()+1}/${x.getDate()}`;
  return `${d.getFullYear()}/${fmt(d)}〜${fmt(e)}`;
}

function getLatestWeekKey(){
  const keys=Object.keys(DB.weeks).sort((a,b)=>a<b?-1:1);
  const today=new Date();today.setHours(0,0,0,0);
  for(let i=keys.length-1;i>=0;i--){
    const wd=new Date(keys[i]+'T00:00:00');
    const we=new Date(wd);we.setDate(we.getDate()+6);
    if(wd<=today&&today<=we)return keys[i];
  }
  return keys.length>0?keys[keys.length-1]:null;
}

function renderTop(){
  const keys=Object.keys(DB.weeks).sort((a,b)=>a<b?-1:1);
  const today=new Date();today.setHours(0,0,0,0);
  let currentKey=null,futureKeys=[],pastKeys=[];
  keys.forEach(k=>{
    const wd=new Date(k+'T00:00:00');
    const we=new Date(wd);we.setDate(we.getDate()+6);
    if(wd<=today&&today<=we) currentKey=k;
    else if(wd>today) futureKeys.push(k);
    else pastKeys.push(k);
  });
  // fallback: show latest if no current week
  if(!currentKey&&keys.length) currentKey=keys[keys.length-1];

  const todayFmt=(()=>{const t=new Date();return `${t.getMonth()+1}月${t.getDate()}日(${['日','月','火','水','木','金','土'][t.getDay()]}曜日)`;})();
  let latestHtml='';
  if(currentKey){
    const wd=DB.weeks[currentKey];
    const dd=DAYS.find(d=>wd.menus[d]&&wd.menus[d].cooking)||'月';
    latestHtml=`<div style="font-size:19px;font-weight:700;color:var(--navy);margin-bottom:10px;text-align:center">📅 今日: ${todayFmt}</div>

      <div class="today-week-icon">🍽️</div>
      <div class="today-week-label">今週の献立</div>
      <div class="today-week-date">${getWeekLabel(currentKey)}</div>
      <div class="today-badge">開く ›</div>
    </button>`;
  }else{
    latestHtml=`<div style="font-size:19px;font-weight:700;color:var(--navy);margin-bottom:10px;text-align:center">📅 今日: ${todayFmt}</div>
    <p style="color:var(--gray);font-size:14px;padding:12px 0;text-align:center">今週の献立が登録されていません</p>`;
  }

  const curSize=localStorage.getItem('menuApp_fontSize')||'medium';
  const navGrid=`<div class="top-nav-grid">
    <div class="top-nav-btn" onclick="go('future')"><span class="nav-icon">📅</span>来週以降の献立</div>
    <div class="top-nav-btn" onclick="go('past')"><span class="nav-icon">📂</span>過去の献立</div>
    <div class="top-nav-btn" onclick="go('all-menus')"><span class="nav-icon">📋</span>全献立リスト</div>
    <div class="top-nav-btn" onclick="go('info')"><span class="nav-icon">ℹ️</span>前提情報・ルール</div>
  </div>

    <span style="font-size:13px;color:var(--gray);font-weight:600;white-space:nowrap">🔤 文字サイズ</span>
    <button class="btn-secondary" style="flex:1;padding:10px 4px${curSize==='medium'?';border-color:var(--amber);color:var(--amber)':''}" onclick="applyFontSize('medium');renderTop()">中</button>
    <button class="btn-secondary" style="flex:1;padding:10px 4px${curSize==='large'?';border-color:var(--amber);color:var(--amber)':''}" onclick="applyFontSize('large');renderTop()">大</button>
    <button class="btn-secondary" style="flex:1;padding:10px 4px${curSize==='xlarge'?';border-color:var(--amber);color:var(--amber)':''}" onclick="applyFontSize('xlarge');renderTop()">特大</button>

function renderWeek(){
  const k=state.weekKey;
  const weekData=DB.weeks[k];
  if(!weekData){go('top');return;}
  // Set initial day to today if this week contains today
  const todayDate=new Date();todayDate.setHours(0,0,0,0);
  const wkStart=new Date(k+'T00:00:00');
  const wkEnd=new Date(wkStart);wkEnd.setDate(wkEnd.getDate()+6);
  if(todayDate>=wkStart&&todayDate<=wkEnd){
    state.weekDay=DAYS[todayDate.getDay()===0?6:todayDate.getDay()-1]||state.weekDay;
  }
  document.getElementById('week-title').textContent=getWeekLabel(k);

  // day tabs – compute date from weekKey
  let tabHtml='';
  DAYS.forEach((d,i)=>{
    const day=weekData.menus[d];
    const nc=!day||!day.cooking;
    const dt=new Date(k+'T00:00:00');dt.setDate(dt.getDate()+i);
    const dateStr=`${dt.getMonth()+1}/${dt.getDate()}`;
    const isSat=d==='土',isSun=d==='日';
    tabHtml+=`<div class="day-tab${state.weekDay===d?' active':''}${nc?' no-cook':''}${isSat?' sat':''}${isSun?' sun':''}" onclick="setWeekDay('${d}')">${d}<small>${dateStr}</small></div>`;
  });
  document.getElementById('day-tabs').innerHTML=tabHtml;

  // bottom tabs
  ['menu','shop'].forEach(t=>{
    const el=document.getElementById('btab-'+t);
    if(el)el.classList.toggle('active',state.weekTab===t);
  });

  renderWeekContent();
}

function setWeekTab(t){
  state.weekTab=t;
  ['menu','shop'].forEach(x=>{
    const el=document.getElementById('btab-'+x);
    if(el)el.classList.toggle('active',x===t);
  });
  renderWeekContent();
}

function setWeekDay(d){
  state.weekDay=d;
  const tabs=document.querySelectorAll('.day-tab');
  tabs.forEach((t,i)=>{t.classList.toggle('active',DAYS[i]===d);});
  renderWeekContent();
}

function renderWeekContent(){

function renderDishCard(dish,dishIdx,weekKey,day){
  const shopChecks=weekKey?getShopChecks(weekKey):{};
  const _persons=getPersonCount(dish.target);
  const canEdit=!!(weekKey&&day);
  const ings=dish.ingredients.map((i,ii)=>{
    const st=shopChecks[i.n.trim()]||null;
    const baseAmt=getIngAmount(i,_persons);
    const amt=i.adj!=null?i.adj:baseAmt;
    const adjBadge=i.adj!=null?`<span class="ing-adj-badge">✎</span>`:'';
    const amtHtml=canEdit
      ?`<span class="ing-amt editable" onclick="editIngAmt('${esc(weekKey)}','${esc(day)}',${dishIdx},${ii})">${esc(amt)}${adjBadge}</span>`
      :`<span class="ing-amt">${esc(amt)}</span>`;
    return `<div class="ing-row"><span class="ing-name">${esc(i.n)}${shopIngBadge(st)}</span>${amtHtml}</div>`;
  }).join('');
  const equips=(dish.equipment||[]).map(e=>`<span class="equip-tag">${esc(e)}</span>`).join('');
  const note=dish.note?`<div class="dish-section"><div class="note-box">💡 ${esc(dish.note)}</div></div>`:'';
  let ratingHtml='';
  if(weekKey&&day){
    const r=getRatings()[ratingKey(weekKey,day,dish.menu)]||{good:0,bad:0};
    const mn=dish.menu.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    ratingHtml=`<div class="dish-rating">
      <button class="rating-btn good" onclick="toggleRating('${esc(weekKey)}','${esc(day)}','${mn}','good')">👍 ${r.good}</button>
      <button class="rating-btn bad"  onclick="toggleRating('${esc(weekKey)}','${esc(day)}','${mn}','bad')">👎 ${r.bad}</button>
    </div>`;
  }
  return `<div class="dish-card">
    <div class="dish-header">
      <div><div class="dish-title">${esc(dish.menu)}</div>
        <div class="dish-meta">
          ${dish.time?`<span class="tag">⏱${esc(dish.time)}</span>`:''}
        </div>
      </div>
      ${dish.target?`<span class="dish-target">${esc(dish.target)}</span>`:''}
    </div>
    <div class="dish-section"><h4>🥬 材料</h4>${ings}</div>
    ${day==='金'?`<div class="dish-section" style="padding-top:8px;padding-bottom:8px"><div class="note-box">🥕 残りの野菜があれば使用してください</div></div>`:''}
    <div class="dish-section no-print" style="padding-top:8px;padding-bottom:8px"><button onclick="openChatGPT('${esc(dish.menu)}',${_persons})" style="background:#10a37f;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:16px;cursor:pointer;width:100%">🤖 ChatGPTで調理手順を確認</button></div>
    ${equips?`<div class="dish-section"><h4>🍳 使う道具</h4><div class="equip-list">${equips}</div></div>`:''}
    ${note}
    ${ratingHtml}
  </div>`;
}

function getShopChecks(weekKey){
  try{return JSON.parse(localStorage.getItem('shop_'+weekKey)||'{}')}catch(e){return{}}
}
function saveShopChecks(weekKey,checks){localStorage.setItem('shop_'+weekKey,JSON.stringify(checks));pushMenuToGist();}
// 3-state: null/false → 'arranged' → 'stocked' → null
function shopNextState(cur){
  if(!cur)return 'arranged';
  if(cur==='arranged')return 'stocked';
  return null;
}
function shopBadge(state){
  if(state==='arranged')return `<span style="background:var(--green);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0">手配済み</span>`;
  if(state==='stocked')return `<span style="background:#1565C0;color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0">在庫あり</span>`;
  return `<span style="background:var(--gray-l);color:var(--gray);font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0;border:1px solid var(--border)">未確認</span>`;
}
function shopIngBadge(state){
  if(state==='arranged')return `<span style="background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;margin-left:4px">手配済み</span>`;
  if(state==='stocked')return `<span style="background:#1565C0;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;margin-left:4px">在庫あり</span>`;
  return `<span style="background:var(--gray-l);color:var(--gray);font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;margin-left:4px;border:1px solid var(--border)">未確認</span>`;
}
function toggleShop(weekKey,itemId){
  const checks=getShopChecks(weekKey);
  checks[itemId]=shopNextState(checks[itemId]);
  if(!checks[itemId])delete checks[itemId];
  saveShopChecks(weekKey,checks);
}
function resetShop(weekKey){
  localStorage.removeItem('shop_'+weekKey);
}

function printWeek(){
  const k=state.weekKey;
  const weekData=DB.weeks[k];
  if(!weekData){window.print();return;}
  // Build or update print container
  let el=document.getElementById('print-all-days');
  if(!el){
    el=document.createElement('div');
    el.id='print-all-days';
    el.style.display='none';
    document.getElementById('week-content').appendChild(el);
  }
  let html='';
  DAYS.forEach(d=>{
    const day=weekData.menus[d];
    if(!day||!day.cooking)return;
    const dayLabel=d+(getWeekDayDate(k,d)?` (${getWeekDayDate(k,d)})` :'');
    const cards=(day.dishes||[]).map(dish=>renderDishCard(dish,0,k,null)).join('');
    const sidesHtml=(day.sides&&day.sides.length)
      ?`<div class="print-sides"><span class="print-sides-label">🍱 副菜・サラダ</span>${day.sides.map(s=>esc(s.name)).join('・')}</div>`
      :'';
    html+=`<div class="print-day-block">
      <div class="print-day-header">${dayLabel}</div>
      ${cards}
      ${sidesHtml}
    </div>`;
  });
  el.innerHTML=html||'<p>調理日がありません</p>';
  // Temporarily swap week-content to show print-all-days only
  const wc=document.getElementById('week-content');
  const prev=wc.innerHTML;
  wc.innerHTML=el.outerHTML;
  window.print();
  wc.innerHTML=prev;
}
function getWeekDayDate(weekKey,day){
  const DAYMAP={月:0,火:1,水:2,木:3,金:4,土:5,日:6};
  const offset=DAYMAP[day];
  if(offset===undefined)return '';
  const d=new Date(weekKey+'T00:00:00');
  d.setDate(d.getDate()+offset);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function getNextMonday(){
  const d=new Date();
  const day=d.getDay();
  // 今週の月曜（日曜なら翌月曜、それ以外は当週月曜）
  const diff=day===0?1:(1-day);
  d.setDate(d.getDate()+diff);
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function getAwDayDate(day){
  const start=document.getElementById('aw-start-date').value;
  if(!start)return '';
  const idx=DAYS.indexOf(day);
  const d=new Date(start+'T00:00:00');
  d.setDate(d.getDate()+idx);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function renderAdminWeek(){
  const k=state.editingWeekKey;
  document.getElementById('admin-week-title').textContent=k?'週の編集':'新しい週を追加';
  if(k){
    const wd=DB.weeks[k];
    document.getElementById('aw-start-date').value=k;
    awDayState.days={};
    DAYS.forEach(d=>{awDayState.days[d]=JSON.parse(JSON.stringify(wd.menus[d]||{cooking:false,dishes:[],sides:[]}));});
  }else{
    let initDate=getNextMonday();
    while(DB.weeks[initDate]){
      const _d=new Date(initDate+'T00:00:00');_d.setDate(_d.getDate()+7);
      initDate=`${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`;
    }
    document.getElementById('aw-start-date').value=initDate;
    awDayState.days={};
    const DAY_DEFAULTS={'月':[{target:'父・兄（2人分）',menu:'',time:'25分',ingredients:[]},{target:'母（1人分）',menu:'',time:'10分',ingredients:[]}],'火':[{target:'3人分',menu:'',time:'25分',ingredients:[]}],'水':[{target:'3人分',menu:'',time:'15分',ingredients:[]}],'金':[{target:'3人分',menu:'',time:'20分',ingredients:[]}]};
    DAYS.forEach((d,i)=>{
      const hasCook=['月','火','水','金'].includes(d);
      const defDishes=DAY_DEFAULTS[d]?JSON.parse(JSON.stringify(DAY_DEFAULTS[d])):[{target:'',menu:'',time:'',ingredients:[]}];
      awDayState.days[d]={cooking:hasCook,dishes:hasCook?defDishes:[],sides:[]};
    });
  }
  awDayState.day='月';
  setAdminWeekTab('menu');
}

function buildShoppingList(menus){
  const MEAT=['豚','鶏','牛','ラム','ひき肉','ミンチ','海老','えび','サバ','鮭','ブリ','タラ','鯛','アジ','サンマ','カツオ','マグロ','イカ','ホタテ','アサリ','ベーコン','ソーセージ','ハム','ちくわ','かまぼこ','鶏肉','豚肉','牛肉'];
  const VEGS=['玉ねぎ','キャベツ','白菜','なす','ピーマン','にんじん','人参','大根','もやし','ほうれん草','小松菜','ブロッコリー','トマト','きのこ','しめじ','えのき','まいたけ','じゃがいも','さつまいも','ゴーヤ','ズッキーニ','セロリ','ねぎ','長ねぎ','ニラ','アスパラ','レタス','きゅうり','ごぼう','れんこん','枝豆','冷凍野菜','パプリカ','かぼちゃ','春菊','チンゲン菜'];
  const TOFU=['豆腐','卵','たまご','厚揚げ','油揚げ','高野豆腐','絹豆腐','木綿豆腐'];
  function catIng(n){
    if(MEAT.some(k=>n.includes(k)))return '肉・魚介';
    if(VEGS.some(k=>n.includes(k)))return '野菜';
    if(TOFU.some(k=>n.includes(k)))return '豆腐・卵';
    return '調味料・その他';
  }
  const buckets={'肉・魚介':{icon:'🥩',map:{}},'野菜':{icon:'🥦',map:{}},'豆腐・卵':{icon:'🥚',map:{}},'調味料・その他':{icon:'🧂',map:{}}};
  DAYS.forEach(d=>{
    const day=menus[d];
    if(!day||!day.cooking)return;
    (day.dishes||[]).forEach(dish=>{
      const ings=(dish.ingredients||[]).filter(i=>i.n&&i.n.trim());
      if(ings.length===0&&dish.menu&&dish.menu.trim()){
        // 材料未登録の手動入力献立: メニュー名をその他に登録
        const key=dish.menu.trim();
        if(!buckets['調味料・その他'].map[key])buckets['調味料・その他'].map[key]={id:key,name:key,detail:'その他'};
      }
      const _p=getPersonCount(dish.target);
      ings.forEach(ing=>{
        const key=ing.n.trim();
        const cat=catIng(key);
        if(!buckets[cat].map[key])buckets[cat].map[key]={id:key,name:key,detail:''};
        const dispAmt=ing.adj!=null?ing.adj:getIngAmount(ing,_p);
        const detail=`${dispAmt}(${dish.menu.slice(0,8)})`;
        buckets[cat].map[key].detail+=(buckets[cat].map[key].detail?'、':'')+detail;
      });
    });
    (day.sides||[]).forEach(s=>{
      if(!s.name||!s.name.trim())return;
      const cat=s.type==='サラダ'?'野菜':'調味料・その他';
      const key=s.name;
      if(!buckets[cat].map[key])buckets[cat].map[key]={id:key,name:s.name,detail:s.type};
    });
  });
  return Object.entries(buckets)
    .map(([cat,v])=>({category:cat,icon:v.icon,items:Object.values(v.map)}))
    .filter(c=>c.items.length>0);
}

function saveAdminWeek(){
  const startDate=document.getElementById('aw-start-date').value.trim();
  if(!startDate){alert('週開始日を入力してください');return;}
  const menus={};
  DAYS.forEach(d=>{menus[d]=awDayState.days[d];});

  const weekKey=startDate;
  const isNew=!state.editingWeekKey||state.editingWeekKey!==weekKey;
  const doSave=()=>{
    DB.weeks[weekKey]={menus,shopping:buildShoppingList(menus)};
    if(state.editingWeekKey&&state.editingWeekKey!==weekKey){
      delete DB.weeks[state.editingWeekKey];
    }
    state.editingWeekKey=weekKey;
    saveData(DB);
    showRatingToast('保存しました');
    renderAdminShopChecklist();
  };
  if(isNew&&DB.weeks[weekKey]){
    appConfirm(`${weekKey} の献立は既に登録されています。上書きしますか？`,doSave);
    return;
  }
  doSave();
}

function updatePresetList(){

    return `<div class="preset-item">

function filterPresets(query,activeLabels){
  return ALL_PRESETS.filter(d=>{
    const lbls=d.labels||[];
    const matchLabel=!activeLabels||!activeLabels.length||activeLabels.every(l=>lbls.includes(l));
    const matchQ=!query||d.menu.includes(query)||(d.ingredients&&d.ingredients.some(i=>i.n&&i.n.includes(query)));
    return matchLabel&&matchQ;
  });
}
// 段階的シングルセレクト：ラベルを追加（既選択なら以降を削除）
function toggleLabel(l){
  const idx=awActiveLabels.indexOf(l);
  if(idx>=0){
    // タップ済みラベル → そこから以降を全解除
    awActiveLabels.splice(idx);
  } else {
    awActiveLabels.push(l);
  }
  updatePresetOverlayList();
}
// 現在の絞り込み結果に存在するラベルセットを返す（選択済みを除く）
function getAvailableLabels(){
  const filtered=filterPresets(awPresetFilter,awActiveLabels);
  const s=new Set();
  filtered.forEach(p=>(p.labels||[]).forEach(l=>{
    if(!awActiveLabels.includes(l)) s.add(l);
  }));
  return s;
}

      +`</div>`

  // 次の選択肢（絞り込み後に存在するラベル、1つだけ選べる）

function getCookMethod(menuName){
  if(!menuName)return 'その他';
  if(/唐揚げ|から揚げ|フライ|天ぷら|竜田揚/.test(menuName))return '揚げ';
  if(/炒め|ソテー|チャーハン/.test(menuName))return '炒め';
  if(/照り焼き|蒲焼き|塩焼き|みそ焼き|ムニエル|焼き|グリル|ロースト/.test(menuName))return '焼き';
  if(/煮物|煮付け|みそ煮|シチュー|カレー|スープ|おでん|ポトフ|煮込み|うま煮|クリーム煮|重ね煮|とろみ煮/.test(menuName))return '煮';
  if(/蒸し/.test(menuName))return '蒸し';
  return 'その他';
}
const WEEK_SEASON_KW=['醤油','しょうゆ','みりん','砂糖','塩','酢','酒','油','サラダ油','バター','こしょう','だし','コンソメ','スープ','ソース','カレー粉','片栗粉','小麦粉','薄力粉','パン粉','しょうが','にんにく','豆板醤','ごま','マヨ','ケチャ','ポン酢','みそ','味噌','ウスター','水','牛乳','豆乳'];
function isWeekSeasoning(name){return WEEK_SEASON_KW.some(k=>name.includes(k));}
function getIngAmount(ing,persons){
  if(ing.a1!=null)return persons>=3?ing.a3:persons===2?ing.a2:ing.a1;
  return isWeekSeasoning(ing.n)?ing.a:scaleAmount(ing.a,persons);
}
function editIngAmt(weekKey,day,dishIdx,ingIdx){
  const week=DB.weeks[weekKey];
  if(!week)return;
  const ing=week.menus[day].dishes[dishIdx].ingredients[ingIdx];
  const _p=getPersonCount(week.menus[day].dishes[dishIdx].target);
  const baseAmt=getIngAmount(ing,_p);
  const current=ing.adj!=null?ing.adj:baseAmt;
  const val=prompt(`「${ing.n}」の分量を入力\n（空白で自動計算に戻す）`,current);
  if(val===null)return;

function getPersonCount(target){
  if(target==='母（1人分）')return 1;
  if(target==='父・兄（2人分）')return 2;
  if(target==='3人分')return 3;
  return 1;
}
function scaleAmount(str,n){
  if(!str||n<=1)return str;
  const noScale=['適量','少々','適宜','少量','ひとつまみ','お好みで','各適量'];
  if(noScale.some(s=>str.includes(s)))return str;
  // 缶・箱は1単位で使うためスケールしない
  const scaleUnits=['g','ml','cc','切れ','尾','個','本','枚','束','丁','合','株','袋'];
  if(!scaleUnits.some(u=>str.includes(u)))return str;
  const nm=str.match(/^([\d]+(?:\/[\d]+)?(?:\.\d+)?)(.*?)(?:（([\d.]+)(g|ml|cc)）(.*))?$/);
  if(nm){
    const base=nm[1].includes('/')?eval(nm[1]):parseFloat(nm[1]);
    const unit=nm[2]||'';
    const bracketNum=nm[3];const bracketUnit=nm[4];const bracketSuffix=nm[5]||'';
    const primaryScaleable=scaleUnits.some(u=>unit===u||unit.endsWith(u));
    if(!primaryScaleable)return str;
    if(bracketNum){return _fmtNum(base*n)+unit+'（'+_fmtNum(parseFloat(bracketNum)*n)+bracketUnit+'）'+bracketSuffix;}
    return _fmtNum(base*n)+unit;
  }
  return str;
}
function _fmtNum(v){
  if(Number.isInteger(v))return String(v);
  const fracs=[[1,2],[1,3],[2,3],[1,4],[3,4],[1,6],[5,6]];
  for(const[a,b]of fracs){if(Math.abs(v-a/b)<0.01)return a+'/'+b;}
  const whole=Math.floor(v);const frac=v-whole;
  for(const[a,b]of fracs){if(Math.abs(frac-a/b)<0.01)return whole>0?whole+'と'+a+'/'+b:a+'/'+b;}
  return String(Math.round(v*10)/10);
}
function getMainIngs(dish){return(dish.ingredients||[]).map(i=>i.n).filter(n=>!isWeekSeasoning(n));}
// opts: { requireLabels:string[], excludeLabels:string[], ingKeyword:string, excludeMenus:Set }
function getRandomPreset(opts){
  opts=opts||{};
  const requireLabels=opts.requireLabels||[];
  const excludeLabels=opts.excludeLabels||[];
  const ingKeyword=opts.ingKeyword||null;
  const excludeMenus=opts.excludeMenus||null;
  const now=new Date();now.setHours(0,0,0,0);
  const oneMonthAgo=new Date(now);oneMonthAgo.setMonth(oneMonthAgo.getMonth()-1);
  const ratings=getRatings();
  const recentUsed=new Set(),everUsed=new Set();
  Object.entries(DB.weeks).forEach(([wk,wd])=>{
    const wkDate=new Date(wk+'T00:00:00');
    DAYS.forEach(d=>{
      (wd.menus?.[d]?.dishes||[]).forEach(dish=>{
        everUsed.add(dish.menu);
        if(wkDate>=oneMonthAgo)recentUsed.add(dish.menu);
      });
    });
  });
  let pool=ALL_PRESETS.slice();
  if(requireLabels.length) pool=pool.filter(p=>requireLabels.every(l=>(p.labels||[]).includes(l)));
  if(excludeLabels.length) pool=pool.filter(p=>excludeLabels.every(l=>!(p.labels||[]).includes(l)));
  if(ingKeyword) pool=pool.filter(p=>p.menu.includes(ingKeyword)||(p.ingredients||[]).some(i=>i.n.includes(ingKeyword)));
  if(excludeMenus&&excludeMenus.size) pool=pool.filter(p=>!excludeMenus.has(p.menu));
  pool=pool.filter(p=>{
    if(recentUsed.has(p.menu))return false;
    let g=0,b=0;
    Object.entries(ratings).forEach(([k,v])=>{
      if(k.split('_').slice(2).join('_')===p.menu||k==='allmenus_'+p.menu){g+=v.good;b+=v.bad;}
    });
    if(b>0&&b>g)return false;
    if(everUsed.has(p.menu)&&g===0&&b===0)return false;
    return true;
  });
  if(!pool.length)return null;
  return pool[Math.floor(Math.random()*pool.length)];
}
// 曜日ごとのラベルルール定義
// 各エントリ: {requireLabels:[], excludeLabels:[], ingKeyword:''}
function getDayLabelRules(d, weekEpoch){
  // 金曜日は肉野菜か肉無しをランダムで選ぶ
  const friLabel = weekEpoch%2===0 ? '肉野菜' : '肉無し';
  const rules = {
    '月': [
      {requireLabels:['肉メイン'], excludeLabels:['レトルト完成品']},
      {requireLabels:['魚','レトルト完成品']}
    ],
    '火': [{requireLabels:['海老'], excludeLabels:['レトルト完成品']}],
    '水': [{requireLabels:['魚'], excludeLabels:['レトルト完成品']}],
    '金': [{requireLabels:[friLabel], excludeLabels:['魚','レトルト完成品']}],
  };
  return rules[d]||null;
}
function pickRandom(dishIdx){
  const d=awDayState.day;
  const ws=document.getElementById('aw-start-date')?.value;
  const we=ws?Math.floor(new Date(ws+'T00:00:00').getTime()/(7*24*3600*1000)):0;
  const dayRules=getDayLabelRules(d,we);
  let reqLabels=[],excLabels=[],ingKeyword=null;
  if(dayRules&&dayRules[dishIdx]!==undefined){
    const rule=dayRules[dishIdx];
    reqLabels=rule.requireLabels||[];
    excLabels=rule.excludeLabels||[];
    ingKeyword=rule.ingKeyword||null;
  }else{
    // フィルタUI選択を使用
    reqLabels=awActiveLabels&&awActiveLabels.length?awActiveLabels:[];
  }
  // 今週すでに使っている主材料を収集
  const weekUsedIngs=new Set();
  Object.values(awDayState.days).forEach(dayData=>{
    (dayData.dishes||[]).forEach((dish,i)=>{
      if(dayData===awDayState.days[d]&&i===dishIdx)return;
      getMainIngs(dish).forEach(ing=>weekUsedIngs.add(ing));
    });
  });
  const excludeMenus=new Set();
  let result=null;
  for(let attempt=0;attempt<6;attempt++){
    const candidate=getRandomPreset({requireLabels:reqLabels,excludeLabels:excLabels,ingKeyword,excludeMenus});
    if(!candidate)break;
    const ings=getMainIngs(candidate);
    if(!ings.some(i=>weekUsedIngs.has(i))){result=candidate;break;}
    excludeMenus.add(candidate.menu);
    if(attempt===5)result=candidate;
  }
  if(!result)result=getRandomPreset({requireLabels:reqLabels,excludeLabels:excLabels,ingKeyword});
  if(!result)result=getRandomPreset({});
  if(!result){alert('条件に合うメニューが見つかりません');return;}
  addPresetDish(dishIdx,result.menu);
  // 水曜日は対象者を3人分に固定
  if(d==='水'){
    const dish=awDayState.days[d]?.dishes?.[dishIdx];
    if(dish)dish.target='3人分';
  }
  closePresetOverlay();
}
function randomizeWeek(){
  const cookDays=['月','火','水','金'];
  // 木曜日は調理なしに設定
  if(!awDayState.days['木'])awDayState.days['木']={cooking:false,dishes:[],sides:[]};
  awDayState.days['木'].cooking=false;
  // 過去2週間に使われた副菜・サラダ名を収集
  const now2w=new Date();now2w.setHours(0,0,0,0);
  const twoWeeksAgo=new Date(now2w);twoWeeksAgo.setDate(twoWeeksAgo.getDate()-14);
  const recentSides=new Set();
  Object.entries(DB.weeks).forEach(([wk,wd])=>{
    const wkDate=new Date(wk+'T00:00:00');
    if(wkDate>=twoWeeksAgo){
      DAYS.forEach(d=>{(wd.menus?.[d]?.sides||[]).forEach(s=>{if(s.name)recentSides.add(s.name);});});
    }
  });
  const weekUsedSideNames=new Set(); // 週内で使用済みの副菜・サラダ名
  const pickFreshSide=(pool)=>{
    const notUsedThisWeek=pool.filter(s=>!weekUsedSideNames.has(s.name));
    const candidates=notUsedThisWeek.length?notUsedThisWeek:pool;
    const fresh=candidates.filter(s=>!recentSides.has(s.name));
    const final=fresh.length?fresh:candidates;
    return final[Math.floor(Math.random()*final.length)];
  };
  const dayTargets={'月':['父・兄（2人分）','母（1人分）'],'火':['3人分'],'水':['3人分'],'金':['3人分']};
  const weekStart=document.getElementById('aw-start-date').value;
  const weekEpoch=weekStart?Math.floor(new Date(weekStart+'T00:00:00').getTime()/(7*24*3600*1000)):0;
  const saladDayOffset={'月':0,'火':1,'水':2};
  const getSaladForDay=(d)=>{
    const idx=(weekEpoch*3+(saladDayOffset[d]||0))%AEON_SALADS.length;
    const primary=AEON_SALADS[idx];
    if(!weekUsedSideNames.has(primary.name))return primary;
    return pickFreshSide(AEON_SALADS.filter(s=>s.name!==primary.name));
  };
  const sideCatMap={
    '肉メイン':      ['和え物','豆腐・大豆','卵'],
    '海老料理':      ['和え物','豆腐・大豆','卵'],
    '魚料理':        ['豆腐・大豆','和え物','煮物','卵'],
    '残り野菜活用':  ['和え物','豆腐・大豆','卵'],
    '肉野菜':        ['和え物','煮物','豆腐・大豆'],
    '肉無し料理':    ['和え物','煮物','豆腐・大豆'],
    'レトルト調味料':['和え物','煮物','豆腐・大豆'],
  };
  const weekUsedIngs=new Set(); // 週内で使用済みの主要食材
  const weekUsedProteins=new Set(); // 週内で使用済みの主食材ラベル（豚/牛/鶏/魚/海老）
  const PROTEIN_LABELS=['豚','牛','鶏','魚','海老'];
  // 前週金曜の主食材ラベルを収集（月曜との重複回避用）
  const prevFridayProteins=new Set();
  if(weekStart){
    const prevMon=new Date(weekStart+'T00:00:00');prevMon.setDate(prevMon.getDate()-7);
    const prevWeekKey=`${prevMon.getFullYear()}-${String(prevMon.getMonth()+1).padStart(2,'0')}-${String(prevMon.getDate()).padStart(2,'0')}`;
    const prevWeekData=DB.weeks[prevWeekKey];
    if(prevWeekData&&prevWeekData.menus&&prevWeekData.menus['金']){
      (prevWeekData.menus['金'].dishes||[]).forEach(dish=>{
        (dish.labels||[]).filter(l=>PROTEIN_LABELS.includes(l)).forEach(p=>prevFridayProteins.add(p));
      });
    }
  }
  let prevDayMethod=''; // 前日の調理方法
  cookDays.forEach(d=>{
    if(!awDayState.days[d])awDayState.days[d]={cooking:true,dishes:[],sides:[]};
    awDayState.days[d].cooking=true;
    const newDishes=[];
    const dayRules=getDayLabelRules(d,weekEpoch)||[{}];
    dayRules.forEach((rule,itemIdx)=>{
      const reqLabels=rule.requireLabels||[];
      const excLabels=rule.excludeLabels||[];
      const ingKeyword=rule.ingKeyword||null;
      // ラベルで魚・海老等が指定必須の曜日（火=海老/水=魚/月サブ=魚）は重複チェック対象外
      const skipProteinCheck=reqLabels.some(l=>PROTEIN_LABELS.includes(l));
      // 週内食材重複・連続調理法を避けるため最大5回リトライ
      let r=null;
      const excludeMenus=new Set();
      for(let attempt=0;attempt<6;attempt++){
        const candidate=getRandomPreset({requireLabels:reqLabels,excludeLabels:excLabels,ingKeyword,excludeMenus});
        if(!candidate)break;
        const ings=getMainIngs(candidate);
        const hasIngOverlap=ings.some(i=>weekUsedIngs.has(i));
        const proteins=(candidate.labels||[]).filter(l=>PROTEIN_LABELS.includes(l));
        const relevantUsedProteins=d==='月'?new Set([...weekUsedProteins,...prevFridayProteins]):weekUsedProteins;
        const hasProteinOverlap=!skipProteinCheck&&proteins.some(p=>relevantUsedProteins.has(p));
        const method=getCookMethod(candidate.menu);
        const hasMethodConflict=itemIdx===0&&method!=='その他'&&method===prevDayMethod;
        if(!hasIngOverlap&&!hasProteinOverlap&&!hasMethodConflict){r=candidate;break;}
        excludeMenus.add(candidate.menu);
        // 5回目はあきらめて最後の候補を使う
        if(attempt===5)r=candidate;
      }
      if(r){
        getMainIngs(r).forEach(i=>weekUsedIngs.add(i));
        (r.labels||[]).filter(l=>PROTEIN_LABELS.includes(l)).forEach(p=>weekUsedProteins.add(p));
        if(itemIdx===0)prevDayMethod=getCookMethod(r.menu);
        const dish=JSON.parse(JSON.stringify(r));
        dish.target=(dayTargets[d]&&dayTargets[d][itemIdx])||'3人分';
        newDishes.push(dish);
      }
    });
    if(newDishes.length)awDayState.days[d].dishes=newDishes;
    const isCurry=newDishes.some(dish=>dish.menu&&dish.menu.includes('カレー'));
    awDayState.days[d].sides=[];
    if(isCurry){
      awDayState.days[d].sides.push({type:'副菜',name:'福神漬け',search:'福神漬け'});
      awDayState.days[d].sides.push({type:'副菜',name:'らっきょう',search:'らっきょう'});
      weekUsedSideNames.add('福神漬け');weekUsedSideNames.add('らっきょう');
    }else if(d==='金'){
      const warmPool=AEON_SIDES.filter(s=>(s.labels||[]).includes('煮物'));
      const tsukemonoPool=AEON_SIDES.filter(s=>(s.labels||[]).includes('漬物'));
      const side1=pickFreshSide(warmPool);
      if(side1)weekUsedSideNames.add(side1.name);
      const side2=tsukemonoPool.length?pickFreshSide(tsukemonoPool):null;
      if(side2)weekUsedSideNames.add(side2.name);
      if(side1)awDayState.days[d].sides.push({type:'副菜',name:side1.name,search:side1.search||side1.name});
      if(side2)awDayState.days[d].sides.push({type:'サラダ',name:side2.name,search:side2.search||side2.name});
    }else{
      const dayRule0=(getDayLabelRules(d,weekEpoch)||[{}])[0]||{};
      const req0=dayRule0.requireLabels||[];
      const mainLabelKey=req0[0]||'';
      const preferredCats=sideCatMap[mainLabelKey]||['和え物','煮物','豆腐・大豆'];
      const sidePool=AEON_SIDES.filter(s=>(s.labels||[]).some(l=>preferredCats.includes(l)));
      const finalPool=sidePool.length?sidePool:AEON_SIDES;
      const side=pickFreshSide(finalPool);
      if(side)weekUsedSideNames.add(side.name);
      if(side)awDayState.days[d].sides.push({type:'副菜',name:side.name,search:side.search||side.name});
      if(['月','火','水'].includes(d)){
        const salad=getSaladForDay(d);
        if(salad)weekUsedSideNames.add(salad.name);
        if(salad)awDayState.days[d].sides.push({type:'サラダ',name:salad.name,search:salad.search||salad.name});
      }
    }
  });
  renderAdminDayContent();
}

      +allMenusLabels.map((l,i)=>`<button class="preset-cat-btn active" style="font-size:12px;padding:4px 10px" onclick="allMenusLabels.splice(${i});renderAllMenus()">${esc(l)} ×</button>`).join('<span style="color:var(--gray);align-self:center">›</span>')

      +`</div>`

  const available=getAllMenusAvailableLabels();

      .filter(l=>available[l]!=null)

}
function openChatGPT(menuName,persons){
  let dish=ALL_PRESETS.find(p=>p.menu===menuName);

  const escaped=prompt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  ov.innerHTML=`<div style="background:#fff;border-radius:16px;padding:20px;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.2);max-height:80vh;display:flex;flex-direction:column;gap:0"><div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:12px">🤖 ChatGPT 用プロンプト</div><div style="background:#e8f8f2;border:2px solid #10a37f;border-radius:10px;padding:12px;margin-bottom:12px;font-size:13px;color:#0a7a5e;line-height:1.8;font-weight:700">次の手順で進めてください<br>① 「コピーして ChatGPT を開く」ボタンをタップ（テキストは自動でコピーされます）<br>② ChatGPT が開いたら入力欄を<u>長押し</u>して「貼り付け」をタップ</div><textarea readonly id="cgpt-prompt-text" style="flex:1;min-height:180px;border:1px solid #ddd;border-radius:8px;padding:10px;font-size:13px;line-height:1.7;resize:none;font-family:inherit;color:#333;background:#f9f9f9">${escaped}</textarea><div style="display:flex;gap:10px;margin-top:12px"><button onclick="document.getElementById('app-modal-overlay').remove()" class="btn-secondary" style="flex:1">閉じる</button><button id="cgpt-go-btn" style="flex:2;background:#10a37f;color:#fff;border:none;border-radius:var(--r);padding:12px;font-size:14px;font-weight:700;cursor:pointer">📋 コピーして ChatGPT を開く</button></div></div>`;
  document.body.appendChild(ov);
  document.getElementById('cgpt-go-btn').onclick=async()=>{
    const btn=document.getElementById('cgpt-go-btn');
    btn.disabled=true;
    let copied=false;
    // iOS Safari: clipboard API works inside user gesture
    try{
      await navigator.clipboard.writeText(prompt);
      copied=true;
    }catch(e){
      // Android / fallback: select textarea and execCommand
      try{
        const ta=document.getElementById('cgpt-prompt-text');
        ta.removeAttribute('readonly');
        ta.focus();
        ta.setSelectionRange(0,ta.value.length);
        copied=document.execCommand('copy');
        ta.setAttribute('readonly','');
      }catch(e2){}
    }

  };

function toggleAllMenuRating(menuName,type){
  const r=getRatings();
  const k='allmenus_'+menuName;
  if(!r[k])r[k]={good:0,bad:0};
  const mv=getMyVotes();
  const prev=mv[k]||null;
  if(prev===type){
    r[k][type]=Math.max(0,(r[k][type]||1)-1);
    mv[k]=null;
    showRatingToast('取り消しました');
  }else{
    if(prev){r[k][prev]=Math.max(0,(r[k][prev]||1)-1);}
    r[k][type]=(r[k][type]||0)+1;
    mv[k]=type;
    showRatingToast(type==='good'?'👍 いいね！':'👎 うーん…');
  }
  saveRatings(r);saveMyVotes(mv);
  renderAllMenus();
}

function getRatings(){try{return JSON.parse(localStorage.getItem('ratings_v2')||'{}')}catch(e){return{}}}
function saveRatings(r){try{localStorage.setItem('ratings_v2',JSON.stringify(r))}catch(e){return;}pushRatingsToGist();}
function ratingKey(wk,d,menuName){return wk+'_'+d+'_'+menuName}
function getSideLastUsed(name){
  let latest='';
  Object.entries(DB.weeks).forEach(([wk,wd])=>{
    DAYS.forEach(d=>{
      (wd.menus?.[d]?.sides||[]).forEach(s=>{
        if(s.name===name&&(!latest||wk>latest))latest=wk;
      });
    });
  });
  if(!latest)return '未選定';
  const dt=new Date(latest+'T00:00:00');
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}
function getSideRatingTotal(name){
  const r=getRatings();
  let g=0,b=0;
  Object.entries(r).forEach(([k,v])=>{
    if(k.split('_').slice(2).join('_')===name){g+=v.good||0;b+=v.bad||0;}
  });
  return {good:g,bad:b};
}
// 端末ごとの投票フラグ（1回限り・再投票でキャンセル）
function getMyVotes(){try{return JSON.parse(localStorage.getItem('my_votes')||'{}')}catch(e){return{}}}
function saveMyVotes(v){localStorage.setItem('my_votes',JSON.stringify(v))}
function toggleRating(wk,d,menuName,type){
  const r=getRatings();const k=ratingKey(wk,d,menuName);
  if(!r[k])r[k]={good:0,bad:0};
  const mv=getMyVotes();
  const prev=mv[k]||null;
  if(prev===type){
    // 同じボタンを再タップ → キャンセル
    r[k][type]=Math.max(0,(r[k][type]||1)-1);
    mv[k]=null;
    showRatingToast('取り消しました');
  }else{
    // 前の投票を取り消してから新しい投票
    if(prev){r[k][prev]=Math.max(0,(r[k][prev]||1)-1);}
    r[k][type]=(r[k][type]||0)+1;
    mv[k]=type;
    showRatingToast(type==='good'?'👍 いいね！':'👎 うーん…');
  }
  saveRatings(r);saveMyVotes(mv);
  renderWeekContent();
}
function showRatingToast(msg){
  let t=document.getElementById('rating-toast');
  if(!t){t=document.createElement('div');t.id='rating-toast';t.className='rating-toast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('show'),1500);
}

function getPresetStats(menuName){
  const ratings=getRatings();let lastWk=null,g=0,b=0;
  Object.entries(DB.weeks).forEach(([wk,wd])=>{
    DAYS.forEach(d=>{
      (wd.menus&&wd.menus[d]&&wd.menus[d].dishes||[]).forEach(dish=>{
        if(dish.menu!==menuName)return;
        if(!lastWk||wk>lastWk)lastWk=wk;
        const rv=ratings[ratingKey(wk,d,menuName)]||{good:0,bad:0};
        g+=rv.good;b+=rv.bad;
      });
    });
  });
  if(!lastWk)return '';
  const dt=new Date(lastWk+'T00:00:00');
  const ds=`${dt.getMonth()+1}/${dt.getDate()}`;
  if(g>0&&g>=b*2)return `⭐前回好評 📅${ds}`;
  if(b>0&&b>g)return `⚠前回不評 📅${ds}`;
  return `📅${ds} 採用済`;
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ===================== GIST SYNC =====================
// ↓ GistのIDをここに入力してください（作成したGistのURLの末尾の英数字）
const GIST_ID = 'c383bc2d0efaa0a832fee81448096478';
// ↑ 例: 'a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4'

function getGistId(){return GIST_ID&&GIST_ID!=='YOUR_GIST_ID_HERE'?GIST_ID:null;}
async function syncFromGist(){
  const gistId=getGistId();
  if(!gistId)return;
  try{
    const res=await fetch(`https://api.github.com/gists/${gistId}`);
    if(!res.ok)return;
    const gist=await res.json();
    const file=gist.files&&gist.files['menuapp-data.json'];
    if(!file)return;
    const raw=JSON.parse(file.content);
    // ローカルの最終保存時刻がGistより新しい場合は上書きしない
    const localTs=localStorage.getItem('menuApp_localUpdatedAt')||'';
    const gistTs=raw.updatedAt||'';
    if(localTs&&gistTs&&localTs>gistTs){
      console.log('Local data is newer than Gist, skipping overwrite');
      return;
    }
    if(raw.menuApp_v4)localStorage.setItem('menuApp_v4',JSON.stringify(raw.menuApp_v4));
    if(raw.ratings_v2)localStorage.setItem('ratings_v2',JSON.stringify(raw.ratings_v2));
    if(raw.shopChecks){
      Object.entries(raw.shopChecks).forEach(([k,v])=>localStorage.setItem('shop_'+k,JSON.stringify(v)));
    }
  }catch(e){console.warn('Gist sync failed',e);}
}
async function fetchGistCurrent(){
  const gistId=getGistId();
  if(!gistId)return{version:1};
  try{
    const res=await fetch(`https://api.github.com/gists/${gistId}`);
    if(!res.ok)return{version:1};
    const gist=await res.json();
    const file=gist.files&&gist.files['menuapp-data.json'];
    if(!file)return{version:1};
    return JSON.parse(file.content)||{version:1};
  }catch(e){return{version:1};}
}
async function writeGist(payload){
  const gistId=getGistId();
  const pat=localStorage.getItem('menuApp_gistPat');
  if(!gistId||!pat)return;
  try{
    const res=await fetch(`https://api.github.com/gists/${gistId}`,{
      method:'PATCH',
      headers:{Authorization:`token ${pat}`,'Content-Type':'application/json'},
      body:JSON.stringify({files:{'menuapp-data.json':{content:JSON.stringify(payload,null,2)}}})
    });
    if(!res.ok)showRatingToast('⚠️ Gist同期失敗（'+res.status+'）');
  }catch(e){console.warn('Gist push failed',e);showRatingToast('⚠️ Gist同期エラー：ネットワークを確認してください');}
}
async function pushMenuToGist(){
  const current=await fetchGistCurrent();
  const shopChecks={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('shop_')){try{shopChecks[k.slice(5)]=JSON.parse(localStorage.getItem(k));}catch(e){}}
  }
  await writeGist({
    ...current,
    updatedAt:new Date().toISOString(),
    menuApp_v4:JSON.parse(localStorage.getItem('menuApp_v4')||'null'),
    shopChecks
  });
}
async function pushRatingsToGist(){
  const current=await fetchGistCurrent();
  await writeGist({
    ...current,
    updatedAt:new Date().toISOString(),
    ratings_v2:JSON.parse(localStorage.getItem('ratings_v2')||'{}')
  });
}
function saveGistPat(v){localStorage.setItem('menuApp_gistPat',v.trim());showRatingToast('PATを保存しました');}
async function testGistSync(){
  const gistId=getGistId();
  if(!gistId){showRatingToast('⚠️ Gist IDがHTMLに設定されていません');return;}
  showRatingToast('接続テスト中...');
  try{
    const res=await fetch(`https://api.github.com/gists/${gistId}`);
    if(res.ok){showRatingToast('✅ 接続成功');}
    else{showRatingToast('❌ 接続失敗（'+res.status+'）');}
  }catch(e){showRatingToast('❌ 接続エラー');}
}
