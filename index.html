<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>夕食献立管理</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a1a4e;--amber:#E8A020;--amber-l:#FFF0CC;
  --green:#2E7D32;--green-l:#E8F5E9;--red:#C62828;
  --gray:#757575;--gray-l:#F5F5F5;--border:#E0D8C8;
  --bg:#FFFDF5;--shadow:0 2px 8px rgba(0,0,0,.1);--r:12px;--nav:68px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--navy);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}
.header{background:var(--navy);color:#fff;padding:16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:700;flex:1}
.header .back-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px 8px}
.content{flex:1;padding:16px;padding-bottom:calc(var(--nav)+16px)}
.content.no-pad-bottom{padding-bottom:16px}

/* TOP */
.week-card{background:#fff;border:2px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);transition:.2s}
.week-card:hover{border-color:var(--amber)}
.week-card.latest{border-color:var(--amber);background:var(--amber-l)}
.week-card .label{font-size:15px;font-weight:600}
.week-card .latest-badge{background:var(--amber);color:#fff;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700}
.week-card .arrow{color:var(--gray);font-size:18px}
.section-title{font-size:13px;color:var(--gray);font-weight:600;margin:16px 0 8px;text-transform:uppercase;letter-spacing:.5px}
.info-btn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:20px}
.archive-link{text-align:center;color:var(--amber);font-size:14px;cursor:pointer;padding:12px;text-decoration:underline}

/* WEEK TABS */
.week-tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:57px;z-index:90;overflow-x:auto}
.week-tabs::-webkit-scrollbar{display:none}
.day-tab{flex:0 0 auto;padding:10px 14px;font-size:13px;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.day-tab.active{color:var(--navy);border-bottom-color:var(--amber)}
.day-tab.no-cook{color:#bbb}
.bottom-tabs{display:flex;background:#fff;border-top:2px solid var(--border);position:sticky;bottom:0;z-index:100}
.btab{flex:1;padding:12px 4px 10px;font-size:11px;font-weight:600;color:var(--gray);cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;border-top:3px solid transparent}
.btab.active{color:var(--amber);border-top-color:var(--amber)}
.btab .ico{font-size:22px}

/* DISH CARD */
.dish-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.dish-header{padding:14px 16px;background:var(--green-l);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.dish-title{font-size:18px;font-weight:700;color:var(--navy)}
.dish-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--gray-l);color:var(--gray);font-weight:600}
.tag.green{background:var(--green-l);color:var(--green)}
.dish-target{font-size:12px;color:var(--gray);background:#fff;border-radius:6px;padding:2px 8px}
.dish-section{padding:12px 16px;border-bottom:1px solid var(--border)}
.dish-section:last-child{border-bottom:none}
.dish-section h4{font-size:13px;font-weight:700;color:var(--gray);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.ing-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0ede5;font-size:14px}
.ing-row:last-child{border-bottom:none}
.ing-name{color:var(--navy)}
.ing-amt{color:var(--gray);font-weight:600}
.step-row{display:flex;gap:10px;align-items:flex-start;padding:8px 0;font-size:14px}
.step-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff;margin-top:2px;transition:.15s}
.step-check.done{background:var(--green);border-color:var(--green);color:#fff}
.step-num{font-size:11px;font-weight:700;color:var(--amber);margin-top:2px;flex-shrink:0;width:16px}
.step-text{flex:1;line-height:1.5;color:var(--navy)}
.step-text.done-text{color:var(--gray);text-decoration:line-through}
.equip-list{display:flex;flex-wrap:wrap;gap:6px}
.equip-tag{background:var(--amber-l);color:var(--amber);font-size:12px;padding:4px 10px;border-radius:20px;font-weight:600}
.note-box{background:#FFF9E6;border-left:3px solid var(--amber);padding:10px 12px;border-radius:0 8px 8px 0;font-size:14px;color:var(--navy)}

/* NO COOK */
.no-cook-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:32px 20px;text-align:center;margin-top:20px}
.no-cook-icon{font-size:48px;margin-bottom:12px}
.no-cook-title{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:8px}
.no-cook-sub{font-size:14px;color:var(--gray);line-height:1.7}

/* SHOPPING */
.shop-category{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.shop-cat-header{padding:12px 16px;background:var(--navy);color:#fff;display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
.shop-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.shop-item:last-child{border-bottom:none}
.shop-check{width:24px;height:24px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;transition:.15s}
.shop-check.done{background:var(--green);border-color:var(--green);color:#fff}
.shop-item-name{flex:1;font-size:14px;font-weight:600}
.shop-item-detail{font-size:12px;color:var(--gray)}

/* PROGRESS */
.progress-bar{height:6px;background:var(--border);border-radius:3px;margin:12px 0 4px}
.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:.3s}
.progress-label{font-size:12px;color:var(--gray);text-align:right}
.reset-btn{width:100%;background:var(--gray-l);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px;color:var(--gray);cursor:pointer;margin-top:8px;font-weight:600}

/* INFO */
.info-section{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.info-sec-header{padding:12px 16px;background:var(--navy);color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
.info-row{padding:10px 16px;border-bottom:1px solid var(--border);font-size:14px;display:flex;gap:8px}
.info-row:last-child{border-bottom:none}
.info-key{color:var(--gray);min-width:80px;flex-shrink:0;font-weight:600}
.info-val{color:var(--navy);flex:1}
.info-badge{display:inline-block;background:var(--amber-l);color:var(--amber);font-size:11px;padding:2px 7px;border-radius:10px;font-weight:700;margin:1px}
.info-badge.red{background:#FDECEA;color:var(--red)}
.info-badge.green{background:var(--green-l);color:var(--green)}

/* ADMIN */
.admin-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
.admin-card h3{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--navy)}
.form-group{margin-bottom:14px}
.form-label{font-size:13px;font-weight:600;color:var(--gray);margin-bottom:4px;display:block}
.form-input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:15px;background:#fff;color:var(--navy);outline:none;transition:.2s}
.form-input:focus{border-color:var(--amber)}
.form-textarea{min-height:80px;resize:vertical;font-family:inherit}
.btn-primary{width:100%;background:var(--amber);color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:16px;font-weight:700;cursor:pointer}
.btn-secondary{width:100%;background:var(--gray-l);border:1px solid var(--border);border-radius:var(--r);padding:12px;font-size:14px;font-weight:600;color:var(--navy);cursor:pointer;margin-top:8px}
.btn-danger{background:var(--red);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer}
.week-admin-row{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.week-admin-row .wlabel{font-size:15px;font-weight:600}
.week-admin-row .actions{display:flex;gap:8px}
.btn-edit{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer}
.admin-day-tabs{display:flex;overflow-x:auto;gap:6px;margin-bottom:16px;padding-bottom:4px}
.admin-day-tabs::-webkit-scrollbar{display:none}
.admin-day-tab{flex:0 0 auto;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid var(--border);background:#fff;color:var(--gray)}
.admin-day-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.cooking-toggle{display:flex;gap:8px;margin-bottom:16px}
.cooking-toggle button{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:2px solid var(--border);background:#fff;color:var(--gray)}
.cooking-toggle button.active{background:var(--green);color:#fff;border-color:var(--green)}
.dish-edit-block{background:var(--gray-l);border-radius:var(--r);padding:14px;margin-bottom:12px}
.dish-edit-block h4{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--navy)}
.alert{padding:10px 14px;border-radius:8px;font-size:14px;margin-bottom:12px}
.alert.success{background:var(--green-l);color:var(--green)}
.alert.error{background:#FDECEA;color:var(--red)}

/* ARCHIVE */
.archive-week-row{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.archive-week-row:hover{opacity:.85}

@media print{
  .week-tabs,.bottom-tabs,.btab,.back-btn,.no-print{display:none!important}
  .dish-card{break-inside:avoid;box-shadow:none;border:1px solid #ddd}
  .screen{display:flex!important}
}
</style>
</head>
<body>
<div id="app">

<!-- TOP -->
<div id="screen-top" class="screen">
  <div class="header"><h1>🍽️ 夕食献立管理</h1><button class="back-btn no-print" onclick="goAdmin()" title="管理">⚙️</button></div>
  <div class="content no-pad-bottom">
    <button class="info-btn" onclick="go('info')">📋 前提情報・ルール</button>
    <div id="top-latest"></div>
    <div class="section-title">過去の献立</div>
    <div id="top-past"></div>
    <div id="top-archive-link"></div>
  </div>
</div>

<!-- WEEK -->
<div id="screen-week" class="screen">
  <div class="header"><button class="back-btn" onclick="go('top')">←</button><h1 id="week-title">献立</h1></div>
  <div id="day-tabs" class="week-tabs"></div>
  <div id="week-content" class="content" style="padding-bottom:calc(var(--nav) + 16px)"></div>
  <div class="bottom-tabs">
    <div class="btab active" id="btab-menu" onclick="setWeekTab('menu')"><span class="ico">📅</span>献立</div>
    <div class="btab" id="btab-shop" onclick="setWeekTab('shop')"><span class="ico">🛒</span>買い物</div>
    <div class="btab" id="btab-steps" onclick="setWeekTab('steps')"><span class="ico">👨‍🍳</span>調理手順</div>
    <div class="btab no-print" id="btab-print" onclick="window.print()"><span class="ico">🖨️</span>印刷</div>
  </div>
</div>

<!-- INFO -->
<div id="screen-info" class="screen">
  <div class="header"><button class="back-btn" onclick="go('top')">←</button><h1>前提情報・ルール</h1></div>
  <div class="content no-pad-bottom" id="info-content"></div>
</div>

<!-- ADMIN LOGIN -->
<div id="screen-admin-login" class="screen">
  <div class="header"><button class="back-btn" onclick="go('top')">←</button><h1>管理画面ログイン</h1></div>
  <div class="content no-pad-bottom">
    <div class="admin-card">
      <h3>🔒 パスワードを入力</h3>
      <div class="form-group">
        <label class="form-label">パスワード</label>
        <input class="form-input" type="password" id="admin-pw-input" placeholder="0000" onkeydown="if(event.key==='Enter')checkAdminPw()">
      </div>
      <div id="admin-pw-error" class="alert error" style="display:none">パスワードが違います</div>
      <button class="btn-primary" onclick="checkAdminPw()">ログイン</button>
    </div>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="screen-admin" class="screen">
  <div class="header"><button class="back-btn" onclick="go('top')">←</button><h1>管理画面</h1></div>
  <div class="content no-pad-bottom">
    <button class="btn-primary" style="margin-bottom:16px" onclick="goAdminNewWeek()">＋ 新しい週を追加</button>
    <div class="section-title">登録済み週</div>
    <div id="admin-week-list"></div>
    <div class="admin-card" style="margin-top:20px">
      <h3>🔑 パスワード変更</h3>
      <div class="form-group"><label class="form-label">新しいパスワード</label><input class="form-input" type="password" id="new-pw" placeholder="新パスワード"></div>
      <button class="btn-primary" onclick="changeAdminPw()">変更する</button>
      <div id="pw-change-msg" style="display:none;margin-top:8px"></div>
    </div>
  </div>
</div>

<!-- ADMIN WEEK EDIT -->
<div id="screen-admin-week" class="screen">
  <div class="header"><button class="back-btn" onclick="go('admin')">←</button><h1 id="admin-week-title">週の設定</h1></div>
  <div class="content no-pad-bottom">
    <div class="admin-card">
      <div class="form-group"><label class="form-label">週開始日（月曜日）</label><input class="form-input" type="date" id="aw-start-date"></div>
    </div>
    <div class="admin-day-tabs" id="aw-day-tabs"></div>
    <div id="aw-day-content"></div>
    <button class="btn-primary" onclick="saveAdminWeek()">💾 保存する</button>
    <button class="btn-secondary" onclick="go('admin')">キャンセル</button>
    <div id="aw-save-msg" style="display:none;margin-top:8px"></div>
  </div>
</div>

<!-- ARCHIVE -->
<div id="screen-archive" class="screen">
  <div class="header"><button class="back-btn" onclick="go('top')">←</button><h1>過去の献立（アーカイブ）</h1></div>
  <div class="content no-pad-bottom" id="archive-content"></div>
</div>

</div>

// ===================== RENDER =====================
function render(){
  const p=state.page;
  if(p==='top') renderTop();
  else if(p==='week') renderWeek();
  else if(p==='info') renderInfo();
  else if(p==='admin') renderAdmin();
  else if(p==='admin-week') renderAdminWeek();
  else if(p==='archive') renderArchive();
}

function getWeekLabel(k){
  const d=new Date(k+'T00:00:00');
  const e=new Date(d);e.setDate(e.getDate()+6);
  const fmt=x=>`${x.getMonth()+1}/${x.getDate()}`;
  return `${d.getFullYear()}/${fmt(d)}〜${fmt(e)}`;
}

function renderTop(){
  const keys=Object.keys(DB.weeks).sort((a,b)=>a<b?-1:1);
  const today=new Date();today.setHours(0,0,0,0);
  // find latest (current or past, most recent)
  let latestKey=null;
  for(let i=keys.length-1;i>=0;i--){
    const wd=new Date(keys[i]+'T00:00:00');
    const we=new Date(wd);we.setDate(we.getDate()+6);
    if(wd<=today||today<=we){latestKey=keys[i];break;}
  }
  if(!latestKey&&keys.length>0)latestKey=keys[keys.length-1];

  const pastKeys=keys.filter(k=>k!==latestKey).reverse();
  const showKeys=pastKeys.slice(0,9);
  const archiveKeys=pastKeys.slice(9);

  const defaultDay=(weekKey)=>{
    const wd=DB.weeks[weekKey];
    if(!wd)return '月';
    const now=new Date();now.setHours(0,0,0,0);
    for(const d of DAYS){
      const dayData=wd.menus[d];
      if(!dayData||!dayData.cooking)continue;
      if(!dayData.date)continue;
      const [m,day]=dayData.date.split('/').map(Number);
      const dt=new Date(new Date(weekKey+'T00:00:00').getFullYear(),m-1,day);
      if(dt>=now)return d;
    }
    return DAYS.find(d=>wd.menus[d]&&wd.menus[d].cooking)||'月';
  };

  let latestHtml='';
  if(latestKey){
    const dd=defaultDay(latestKey);
    latestHtml=`<div class="section-title">今週の献立</div>
    <div class="week-card latest" onclick="go('week',{weekKey:'${latestKey}',weekTab:'menu',weekDay:'${dd}'})">
      <div><div class="label">${getWeekLabel(latestKey)}</div><span class="latest-badge">今週</span></div>
      <span class="arrow">›</span>
    </div>`;
  }

  let pastHtml='';
  showKeys.forEach(k=>{
    pastHtml+=`<div class="week-card" onclick="go('week',{weekKey:'${k}',weekTab:'menu',weekDay:'月'})">
      <div class="label">${getWeekLabel(k)}</div><span class="arrow">›</span>
    </div>`;
  });

  let archHtml='';
  if(archiveKeys.length>0){
    archHtml=`<div class="archive-link" onclick="go('archive')">📦 アーカイブ（${archiveKeys.length}週分）を見る</div>`;
  }

  document.getElementById('top-latest').innerHTML=latestHtml;
  document.getElementById('top-past').innerHTML=pastHtml||'<p style="color:var(--gray);font-size:14px">過去の献立はありません</p>';
  document.getElementById('top-archive-link').innerHTML=archHtml;
}

function renderWeek(){
  const k=state.weekKey;
  const weekData=DB.weeks[k];
  if(!weekData){go('top');return;}
  document.getElementById('week-title').textContent=getWeekLabel(k);

  // day tabs
  let tabHtml='';
  DAYS.forEach(d=>{
    const day=weekData.menus[d];
    const nc=!day||!day.cooking;
    tabHtml+=`<div class="day-tab${state.weekDay===d?' active':''}${nc?' no-cook':''}" onclick="setWeekDay('${d}')">${d}${day&&day.date?'<br><small>'+day.date+'</small>':''}</div>`;
  });
  document.getElementById('day-tabs').innerHTML=tabHtml;

  // bottom tabs
  ['menu','shop','steps'].forEach(t=>{
    const el=document.getElementById('btab-'+t);
    if(el)el.classList.toggle('active',state.weekTab===t);
  });

  renderWeekContent();
}

function setWeekTab(t){
  state.weekTab=t;
  ['menu','shop','steps'].forEach(x=>{
    const el=document.getElementById('btab-'+x);
    if(el)el.classList.toggle('active',x===t);
  });
  renderWeekContent();
}

function setWeekDay(d){
  state.weekDay=d;
  const tabs=document.querySelectorAll('.day-tab');
  tabs.forEach((t,i)=>{t.classList.toggle('active',DAYS[i]===d);});
  renderWeekContent();
}

function renderWeekContent(){
  const k=state.weekKey;
  const weekData=DB.weeks[k];
  const el=document.getElementById('week-content');
  if(!el)return;

  if(state.weekTab==='menu'){
    el.innerHTML=renderMenuTab(weekData);
  }else if(state.weekTab==='shop'){
    el.innerHTML=renderShopTab(weekData,k);
  }else if(state.weekTab==='steps'){
    el.innerHTML=renderStepsTab(weekData,k);
  }
}

function renderMenuTab(weekData){
  const d=state.weekDay;
  const day=weekData.menus[d];
  if(!day||!day.cooking){
    return `<div class="no-cook-card">
      <div class="no-cook-icon">🏠</div>
      <div class="no-cook-title">本日は調理なし</div>
    </div>`;
  }
  return day.dishes.map((dish,di)=>renderDishCard(dish,false,null,null,di)).join('');
}

function renderDishCard(dish,showStepCheck,weekKey,dayKey,dishIdx){
  const ings=dish.ingredients.map(i=>`<div class="ing-row"><span class="ing-name">${i.n}</span><span class="ing-amt">${i.a}</span></div>`).join('');
  const steps=dish.steps.map((s,si)=>`<div class="step-row"><span class="step-num">${si+1}</span><span class="step-text">${s}</span></div>`).join('');
  const equips=(dish.equipment||[]).map(e=>`<span class="equip-tag">${e}</span>`).join('');
  const note=dish.note?`<div class="dish-section"><div class="note-box">💡 ${dish.note}</div></div>`:'';
  return `<div class="dish-card">
    <div class="dish-header">
      <div><div class="dish-title">${dish.menu}</div>
        <div class="dish-meta">
          <span class="tag green">${dish.genre}</span>
          <span class="tag">${dish.category}</span>
          <span class="tag">⏱${dish.time}</span>
        </div>
      </div>
      <span class="dish-target">${dish.target}</span>
    </div>
    <div class="dish-section"><h4>🥬 材料</h4>${ings}</div>
    <div class="dish-section"><h4>📝 手順</h4>${steps}</div>
    ${equips?`<div class="dish-section"><h4>🍳 使う道具</h4><div class="equip-list">${equips}</div></div>`:''}
    ${note}
  </div>`;
}

function renderShopTab(weekData,weekKey){
  if(!weekData.shopping||weekData.shopping.length===0){
    return '<p style="padding:20px;color:var(--gray);text-align:center">買い物リストが登録されていません</p>';
  }
  const savedChecks=getShopChecks(weekKey);
  const total=weekData.shopping.reduce((a,c)=>a+c.items.length,0);
  const done=Object.values(savedChecks).filter(Boolean).length;
  const pct=total>0?Math.round(done/total*100):0;

  let html=`<div style="margin-bottom:16px">
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-label">${done}/${total} 完了 (${pct}%)</div>
  </div>`;

  weekData.shopping.forEach(cat=>{
    const items=cat.items.map(item=>{
      const ck=savedChecks[item.id]||false;
      return `<div class="shop-item" onclick="toggleShop('${weekKey}','${item.id}')">
        <div class="shop-check${ck?' done':''}"><span>${ck?'✓':''}</span></div>
        <div><div class="shop-item-name" style="${ck?'text-decoration:line-through;color:var(--gray)':''}">${item.name}</div>
          <div class="shop-item-detail">${item.detail}</div></div>
      </div>`;
    }).join('');
    html+=`<div class="shop-category">
      <div class="shop-cat-header"><span>${cat.icon}</span>${cat.category}</div>
      ${items}
    </div>`;
  });

  html+=`<button class="reset-btn" onclick="resetShop('${weekKey}')">✖ チェックをリセット</button>`;
  return html;
}

function getShopChecks(weekKey){
  try{return JSON.parse(localStorage.getItem('shop_'+weekKey)||'{}')}catch(e){return{}}
}
function saveShopChecks(weekKey,checks){localStorage.setItem('shop_'+weekKey,JSON.stringify(checks))}
function toggleShop(weekKey,itemId){
  const checks=getShopChecks(weekKey);
  checks[itemId]=!checks[itemId];
  saveShopChecks(weekKey,checks);
  renderWeekContent();
}
function resetShop(weekKey){
  localStorage.removeItem('shop_'+weekKey);
  renderWeekContent();
}

function renderStepsTab(weekData,weekKey){
  const d=state.weekDay;
  const day=weekData.menus[d];
  if(!day||!day.cooking){
    return `<div class="no-cook-card"><div class="no-cook-icon">🏠</div><div class="no-cook-title">本日は調理なし</div></div>`;
  }
  const savedSteps=getStepChecks(weekKey,d);
  let html='';
  day.dishes.forEach((dish,di)=>{
    const total=dish.steps.length;
    const doneSteps=dish.steps.filter((_,si)=>savedSteps[di+'_'+si]).length;
    const pct=total>0?Math.round(doneSteps/total*100):0;
    html+=`<div class="dish-card">
      <div class="dish-header">
        <div><div class="dish-title">${dish.menu}</div></div>
        <span class="dish-target">${dish.target}</span>
      </div>
      <div class="dish-section">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-label">${doneSteps}/${total} 完了</div>
        ${dish.steps.map((s,si)=>{
          const ck=savedSteps[di+'_'+si]||false;
          return `<div class="step-row">
            <div class="step-check${ck?' done':''}" onclick="toggleStep('${weekKey}','${d}',${di},${si})">${ck?'✓':''}</div>
            <span class="step-num">${si+1}</span>
            <span class="step-text${ck?' done-text':''}">${s}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  html+=`<button class="reset-btn" onclick="resetSteps('${weekKey}','${d}')">✖ 手順チェックをリセット</button>`;
  return html;
}

function getStepChecks(weekKey,day){
  try{return JSON.parse(localStorage.getItem('steps_'+weekKey+'_'+day)||'{}')}catch(e){return{}}
}
function saveStepChecks(weekKey,day,checks){localStorage.setItem('steps_'+weekKey+'_'+day,JSON.stringify(checks))}
function toggleStep(weekKey,day,dishIdx,stepIdx){
  const checks=getStepChecks(weekKey,day);
  const k=dishIdx+'_'+stepIdx;
  checks[k]=!checks[k];
  saveStepChecks(weekKey,day,checks);
  renderWeekContent();
}
function resetSteps(weekKey,day){
  localStorage.removeItem('steps_'+weekKey+'_'+day);
  renderWeekContent();
}

function renderAdminWeek(){
  const k=state.editingWeekKey;
  document.getElementById('admin-week-title').textContent=k?'週の編集':'新しい週を追加';
  if(k){
    const wd=DB.weeks[k];
    document.getElementById('aw-start-date').value=k;
    awDayState.days={};
    DAYS.forEach(d=>{awDayState.days[d]=JSON.parse(JSON.stringify(wd.menus[d]||{cooking:false,date:''}));});
  }else{
    document.getElementById('aw-start-date').value='';
    awDayState.days={};
    DAYS.forEach((d,i)=>{
      const hasCook=['月','火','水','金'].includes(d);
      awDayState.days[d]={cooking:hasCook,date:'',dishes:hasCook?[{target:'',menu:'',genre:'',time:'',category:'',ingredients:[],steps:[],equipment:[],note:''}]:[]};
    });
  }
  awDayState.day='月';
  renderAdminDayTabs();
  renderAdminDayContent();
}

function renderAdminDayTabs(){
  let html='';
  DAYS.forEach(d=>{
    html+=`<div class="admin-day-tab${awDayState.day===d?' active':''}" onclick="setAwDay('${d}')">${d}</div>`;
  });
  document.getElementById('aw-day-tabs').innerHTML=html;
}

function setAwDay(d){
  saveCurrentAwDay();
  awDayState.day=d;
  renderAdminDayTabs();
  renderAdminDayContent();
}

function saveCurrentAwDay(){/* fields saved inline on input */}

function renderAdminDayContent(){
  const d=awDayState.day;
  const dayData=awDayState.days[d]||{cooking:false,date:'',dishes:[]};
  const isCook=dayData.cooking;
  let html=`<div class="admin-card">
    <h3>${d}曜日の設定</h3>
    <div class="form-group"><label class="form-label">日付（例: 6/29）</label>
      <input class="form-input" id="aw-date" value="${dayData.date||''}" oninput="awDayState.days[awDayState.day].date=this.value">
    </div>
    <div class="cooking-toggle">
      <button class="${isCook?'active':''}" onclick="setAwCooking(true)">調理あり</button>
      <button class="${!isCook?'active':''}" onclick="setAwCooking(false)">調理なし</button>
    </div>`;

  if(isCook){
    const dishes=dayData.dishes||[];
    dishes.forEach((dish,di)=>{
      html+=renderDishEditBlock(dish,di);
    });
    html+=`<button class="btn-secondary" onclick="addAwDish()" style="margin-top:8px">＋ 料理を追加</button>`;
  }
  html+='</div>';
  document.getElementById('aw-day-content').innerHTML=html;
}

function setAwCooking(v){
  const d=awDayState.day;
  awDayState.days[d].cooking=v;
  if(v&&(!awDayState.days[d].dishes||awDayState.days[d].dishes.length===0)){
    awDayState.days[d].dishes=[{target:'',menu:'',genre:'',time:'',category:'',ingredients:[],steps:[],equipment:[],note:''}];
  }
  renderAdminDayContent();
}

function addAwDish(){
  awDayState.days[awDayState.day].dishes.push({target:'',menu:'',genre:'',time:'',category:'',ingredients:[],steps:[],equipment:[],note:''});
  renderAdminDayContent();
}

function renderDishEditBlock(dish,di){
  const ings=(dish.ingredients||[]).map((ing,ii)=>`<div style="display:flex;gap:6px;margin-bottom:6px">
    <input class="form-input" style="flex:2" placeholder="材料名" value="${esc(ing.n)}" oninput="awDayState.days[awDayState.day].dishes[${di}].ingredients[${ii}].n=this.value">
    <input class="form-input" style="flex:1" placeholder="量" value="${esc(ing.a)}" oninput="awDayState.days[awDayState.day].dishes[${di}].ingredients[${ii}].a=this.value">
  </div>`).join('');
  const steps=(dish.steps||[]).map((s,si)=>`<div style="display:flex;gap:6px;margin-bottom:6px">
    <span style="padding-top:10px;font-size:12px;color:var(--gray);flex-shrink:0">${si+1}.</span>
    <input class="form-input" style="flex:1" value="${esc(s)}" oninput="awDayState.days[awDayState.day].dishes[${di}].steps[${si}]=this.value">
  </div>`).join('');

  return `<div class="dish-edit-block">
    <h4>料理 ${di+1}</h4>
    <div class="form-group"><label class="form-label">対象者</label><input class="form-input" value="${esc(dish.target)}" oninput="awDayState.days[awDayState.day].dishes[${di}].target=this.value"></div>
    <div class="form-group"><label class="form-label">メニュー名</label><input class="form-input" value="${esc(dish.menu)}" oninput="awDayState.days[awDayState.day].dishes[${di}].menu=this.value"></div>
    <div style="display:flex;gap:8px">
      <div class="form-group" style="flex:1"><label class="form-label">ジャンル</label><input class="form-input" value="${esc(dish.genre)}" oninput="awDayState.days[awDayState.day].dishes[${di}].genre=this.value"></div>
      <div class="form-group" style="flex:1"><label class="form-label">時間</label><input class="form-input" value="${esc(dish.time)}" oninput="awDayState.days[awDayState.day].dishes[${di}].time=this.value"></div>
    </div>
    <div class="form-group"><label class="form-label">材料</label>${ings}
      <button class="btn-secondary" style="padding:6px;font-size:12px;margin-top:4px" onclick="addIngredient(${di})">＋ 材料追加</button>
    </div>
    <div class="form-group"><label class="form-label">手順</label>${steps}
      <button class="btn-secondary" style="padding:6px;font-size:12px;margin-top:4px" onclick="addStep(${di})">＋ 手順追加</button>
    </div>
    <div class="form-group"><label class="form-label">備考</label><input class="form-input" value="${esc(dish.note||'')}" oninput="awDayState.days[awDayState.day].dishes[${di}].note=this.value"></div>
    <button class="btn-danger" style="width:100%;margin-top:4px" onclick="removeAwDish(${di})">この料理を削除</button>
  </div>`;
}

function addIngredient(di){
  awDayState.days[awDayState.day].dishes[di].ingredients.push({n:'',a:''});
  renderAdminDayContent();
}
function addStep(di){
  awDayState.days[awDayState.day].dishes[di].steps.push('');
  renderAdminDayContent();
}
function removeAwDish(di){
  awDayState.days[awDayState.day].dishes.splice(di,1);
  renderAdminDayContent();
}

function saveAdminWeek(){
  const startDate=document.getElementById('aw-start-date').value.trim();
  if(!startDate){alert('週開始日を入力してください');return;}
  const menus={};
  DAYS.forEach(d=>{menus[d]=awDayState.days[d];});

  const weekKey=startDate;
  const existing=DB.weeks[weekKey];
  DB.weeks[weekKey]={
    menus,
    shopping:existing?existing.shopping:[]
  };
  if(state.editingWeekKey&&state.editingWeekKey!==weekKey){
    delete DB.weeks[state.editingWeekKey];
  }
  saveData(DB);
  const m=document.getElementById('aw-save-msg');
  m.style.display='block';m.className='alert success';m.textContent='保存しました！';
  setTimeout(()=>{m.style.display='none';go('admin');},1200);
}

// ===================== ARCHIVE =====================
function renderArchive(){
  const keys=Object.keys(DB.weeks).sort((a,b)=>a<b?-1:1);
  const today=new Date();today.setHours(0,0,0,0);
  let latestKey=null;
  for(let i=keys.length-1;i>=0;i--){
    const wd=new Date(keys[i]+'T00:00:00');
    const we=new Date(wd);we.setDate(we.getDate()+6);
    if(wd<=today||today<=we){latestKey=keys[i];break;}
  }
  if(!latestKey&&keys.length>0)latestKey=keys[keys.length-1];
  const pastKeys=keys.filter(k=>k!==latestKey).reverse();
  const archiveKeys=pastKeys.slice(9);
  let html='';
  if(archiveKeys.length===0){
    html='<p style="padding:20px;color:var(--gray);text-align:center">アーカイブはありません</p>';
  }
  archiveKeys.forEach(k=>{
    html+=`<div class="archive-week-row" onclick="go('week',{weekKey:'${k}',weekTab:'menu',weekDay:'月'})">
      <div class="label">${getWeekLabel(k)}</div><span style="color:var(--gray)">›</span>
    </div>`;
  });
  document.getElementById('archive-content').innerHTML=html;
}

// ===================== UTIL =====================
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ===================== INIT =====================
go('top');
</script>
